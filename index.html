<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyJim - Cuidado Emocional Profundo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* SISTEMA DE DESIGN - HeyJim v2.0
     Foco: Calma, Acessibilidade e Imersão
  */
  :root {
    --sky: #c9e8f7;
    --sky-deep: #8ecae6;
    --peach: #fde8d8;
    --warm: #fff7f0;
    --gold: #f4a261;
    --gold-dark: #e07b3a;
    --mint: #a8dabc;
    --coral: #e07b6a;
    --text: #2d2214;
    --text-soft: #6b5744;
    --card-bg: rgba(255, 252, 248, 0.88);
    --shadow: 0 32px 80px rgba(80, 50, 20, 0.15);
    --radius: 32px;
    --radius-sm: 20px;
    --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #b8dff7 0%, #dff0f9 35%, #fde8d8 70%, #fff2e8 100%);
    padding: 20px;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Container Principal */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    height: 720px;
    background: var(--card-bg);
    backdrop-filter: blur(30px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Barra Superior */
  .top-bar {
    padding: 28px 28px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-family: 'DM Serif Display', serif; font-size: 22px; }

  /* Telas */
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 20px 32px 40px;
    animation: slideUp 0.7s ease forwards;
  }
  .screen.active { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tipografia */
  h1 { font-family: 'DM Serif Display', serif; font-size: 32px; text-align: center; margin-bottom: 15px; }
  h2 { font-family: 'DM Serif Display', serif; font-size: 24px; text-align: center; margin-bottom: 12px; }
  .prose { font-size: 16px; line-height: 1.6; text-align: center; color: var(--text-soft); }

  /* Botões Customizados */
  .btn {
    width: 100%;
    padding: 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 12px;
  }
  .btn-primary { background: var(--gold); color: white; box-shadow: 0 10px 25px rgba(244,162,97,0.35); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(244,162,97,0.45); }
  .btn-ghost { background: rgba(0,0,0,0.04); color: var(--text); }
  .btn:active { transform: scale(0.96); }

  /* Grid de Escolhas */
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
  .choice-card {
    background: white;
    padding: 24px 15px;
    border-radius: var(--radius-sm);
    border: 1.5px solid transparent;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
  }
  .choice-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.06); }
  .choice-card .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

  /* Módulo de Respiração */
  .breath-circle-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .breath-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--sky-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 20px;
    transition: all 4s linear;
    box-shadow: 0 0 40px rgba(142,202,230,0.4);
  }
  .breath-circle.expand { transform: scale(1.6); background: var(--mint); }
  .breath-circle.contract { transform: scale(1); background: var(--coral); }

  /* Módulo de Grounding (Cores) */
  .ground-target {
    width: 220px;
    height: 220px;
    border-radius: 40px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    transition: all 0.6s ease;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
  }

  /* Módulo de Diário */
  .journal-box {
    width: 100%;
    height: 200px;
    padding: 20px;
    border-radius: var(--radius-sm);
    border: 2px solid rgba(0,0,0,0.05);
    background: white;
    font-family: inherit;
    font-size: 16px;
    resize: none;
    outline: none;
    transition: var(--transition);
  }
  .journal-box:focus { border-color: var(--gold); box-shadow: 0 0 0 5px rgba(244,162,97,0.1); }

  /* Indicador de "Jim pensando" */
  .typing {
    padding: 10px;
    font-style: italic;
    color: var(--gold-dark);
    font-size: 14px;
    text-align: center;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .jim-icon { font-size: 80px; animation: float 4s ease-in-out infinite; text-align: center; margin: 20px 0; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="brand">HeyJim</div>
    <div id="musicBtn" style="cursor:pointer; font-size: 20px;" onclick="toggleMusic()">🎵</div>
  </div>

  <div class="screen active" id="scr-welcome">
    <div class="jim-icon">🤖</div>
    <h1>Olá! Eu sou o Jim.</h1>
    <p class="prose">Serei seu guia pelos próximos 5 minutos. Não sou um robô de respostas prontas, sou um espaço para você respirar.</p>
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="nextScreen('scr-login')">Vamos começar</button>
  </div>

  <div class="screen" id="scr-login">
    <h2>Como posso te chamar?</h2>
    <p class="prose">Gosto de personalizar nossa conversa.</p>
    <input type="text" id="userName" class="btn btn-ghost" style="text-align:center; background:white; border: 1px solid #ddd;" placeholder="Seu nome aqui...">
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="saveUser()">Continuar →</button>
  </div>

  <div class="screen" id="scr-chat">
    <div id="typing" class="typing" style="display:none;">Jim está processando sua energia...</div>
    <div id="chat-body" style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      </div>
  </div>
</div>

<audio id="bgm" loop src="https://docs.google.com/uc?export=open&id=1Td3OLZVvYA-kgyzbUiFAqSvdazzsZbHs"></audio>

<script>
/**
 * HeyJim Core Script v2.0
 * Um complexo sistema de estados para simular uma sessão de terapia/apoio de 5-6 minutos.
 */

const state = {
  user: "",
  emotion: "",
  path: "",
  music: false,
  groundingIndex: 0,
  journalContent: "",
  timeStart: null
};

// Dados de Localização e Conteúdo
const CONTENT = {
  pt: {
    initial: "Como está seu coração neste exato momento?",
    emotions: [
      { id: "anxious", label: "Ansioso / Acelerado", emoji: "🌪️" },
      { id: "sad", label: "Triste / Desanimado", emoji: "🌧️" },
      { id: "stressed", label: "Estressado / Pressão", emoji: "💥" },
      { id: "overwhelmed", label: "Sobrecarregado", emoji: "🌊" }
    ],
    anxiousPath: [
      "Eu sinto sua pressa. Vamos tentar algo físico? Onde você sente essa ansiedade no corpo?",
      { options: ["No peito", "Na cabeça", "Nas mãos", "Em todo lugar"] },
      "Entendi. Vamos praticar a Ancoragem 5-4-3-2-1 para trazer você de volta ao agora."
    ],
    colors: [
      { name: "Azul", hex: "#5b9bd5", emoji: "🌊" },
      { name: "Verde", hex: "#4caf74", emoji: "🌿" },
      { name: "Amarelo", hex: "#fbc02d", emoji: "☀️" },
      { name: "Vermelho", hex: "#e05252", emoji: "🍎" },
      { name: "Roxo", hex: "#9575cd", emoji: "🔮" },
      { name: "Laranja", hex: "#ff9800", emoji: "🍊" },
      { name: "Rosa", hex: "#e91e63", emoji: "🌸" }
    ]
  }
};

/* --- NAVEGAÇÃO E BÁSICO --- */

function nextScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleMusic() {
  const audio = document.getElementById('bgm');
  state.music = !state.music;
  state.music ? audio.play() : audio.pause();
  document.getElementById('musicBtn').style.opacity = state.music ? "1" : "0.5";
}

function saveUser() {
  const name = document.getElementById('userName').value.trim();
  state.user = name || "Amigo";
  state.timeStart = new Date();
  nextScreen('scr-chat');
  startMainFlow();
}

/* --- FLUXO PRINCIPAL (A LÓGICA QUE CONSOME TEMPO) --- */

async function speak(text, delay = 1500) {
  const body = document.getElementById('chat-body');
  const typing = document.getElementById('typing');
  
  body.innerHTML = "";
  typing.style.display = "block";
  await new Promise(r => setTimeout(r, delay));
  typing.style.display = "none";
  
  const h = document.createElement('h2');
  h.innerText = text;
  body.appendChild(h);
}

async function startMainFlow() {
  await speak(`Olá, ${state.user}. Que bom que você parou um pouco.`);
  await speak(CONTENT.pt.initial);
  
  const body = document.getElementById('chat-body');
  const grid = document.createElement('div');
  grid.className = "choice-grid";
  
  CONTENT.pt.emotions.forEach(emo => {
    const card = document.createElement('div');
    card.className = "choice-card";
    card.innerHTML = `<span class="emoji">${emo.emoji}</span>${emo.label}`;
    card.onclick = () => handleEmotionSelection(emo.id);
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

async function handleEmotionSelection(id) {
  state.emotion = id;
  
  if(id === 'anxious' || id === 'stressed') {
    await speak("Quando a mente corre, o corpo sofre. Vamos começar com a Respiração Quadrada.");
    renderBreathingExercise();
  } else if(id === 'sad' || id === 'overwhelmed') {
    await speak("Às vezes as palavras ajudam a esvaziar o que está cheio demais.");
    renderJournaling();
  }
}

/* --- MÓDULO: RESPIRAÇÃO QUADRADA (2 minutos de duração simulada) --- */

function renderBreathingExercise() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <p class="prose" id="breath-instr">Prepare-se para inspirar...</p>
    <div class="breath-circle-wrap">
      <div class="breath-circle" id="b-circle">Aguarde</div>
    </div>
  `;
  
  let cycles = 0;
  const circle = document.getElementById('b-circle');
  const instr = document.getElementById('breath-instr');
  
  const runCycle = () => {
    if(cycles >= 4) { // 4 ciclos de 16 segundos = ~1 minuto de exercício puro
      startGrounding();
      return;
    }
    
    // Inspirar (4s)
    instr.innerText = "Inspire profundamente...";
    circle.className = "breath-circle expand";
    circle.innerText = "Inspirar";
    
    setTimeout(() => {
      // Segurar (4s)
      instr.innerText = "Segure o ar...";
      circle.innerText = "Segurar";
      
      setTimeout(() => {
        // Expirar (4s)
        instr.innerText = "Solte devagar pelo nariz...";
        circle.className = "breath-circle contract";
        circle.innerText = "Expirar";
        
        setTimeout(() => {
          // Pausa (4s)
          instr.innerText = "Aguarde o próximo ciclo...";
          circle.innerText = "Pausa";
          cycles++;
          setTimeout(runCycle, 4000);
        }, 4000);
      }, 4000);
    }, 4000);
  };
  
  setTimeout(runCycle, 2000);
}

/* --- MÓDULO: ANCORAGEM DE CORES (Aumentado para 7 cores) --- */

async function startGrounding() {
  state.groundingIndex = 0;
  await speak("Agora, vamos conectar seus olhos com o mundo ao seu redor.");
  renderGroundingStep();
}

function renderGroundingStep() {
  const color = CONTENT.pt.colors[state.groundingIndex];
  const body = document.getElementById('chat-body');
  
  body.innerHTML = `
    <p class="prose">Observe o ambiente. Encontre algo na cor:</p>
    <div class="ground-target" style="background-color: ${color.hex}">
      <span>${color.emoji}</span>
      <p style="margin-top:10px">${color.name}</p>
    </div>
    <button class="btn btn-primary" onclick="nextGroundingStep()">Encontrei!</button>
  `;
}

function nextGroundingStep() {
  state.groundingIndex++;
  if(state.groundingIndex < CONTENT.pt.colors.length) {
    renderGroundingStep();
  } else {
    renderJournaling();
  }
}

/* --- MÓDULO: DIÁRIO REFLEXIVO --- */

async function renderJournaling() {
  await speak("Para finalizar, escreva uma coisa que te deixou grato hoje, por menor que seja.");
  const body = document.getElementById('chat-body');
  
  const area = document.createElement('textarea');
  area.className = "journal-box";
  area.id = "userJournal";
  area.placeholder = "Hoje eu me senti grato por...";
  body.appendChild(area);
  
  const btn = document.createElement('button');
  btn.className = "btn btn-primary";
  btn.innerText = "Terminei de escrever";
  btn.onclick = finishSession;
  body.appendChild(btn);
}

/* --- FINALIZAÇÃO --- */

async function finishSession() {
  const content = document.getElementById('userJournal').value;
  await speak("Processando suas reflexões...");
  
  // Simula um tempo de "análise"
  await new Promise(r => setTimeout(r, 3000));
  
  const timeSpent = Math.round((new Date() - state.timeStart) / 60000);
  
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div class="jim-icon">🌤️</div>
    <h2>Orgulho de você, ${state.user}.</h2>
    <p class="prose">Você dedicou cerca de ${timeSpent} minutos para cuidar de si mesmo. Isso é mais do que a maioria das pessoas faz em uma semana inteira.</p>
    <div class="end-card" style="margin-top:20px; padding:20px; background:rgba(168,218,188,0.2); border-radius:15px;">
        <p class="prose" style="font-size:14px; color: #2d8c45;">"O que você escreveu sobre '${content.substring(0,20)}...' ficará guardado no seu coração."</p>
    </div>
    <button class="btn btn-primary" onclick="location.reload()">Fazer novo Check-in</button>
    <p class="prose" style="font-size:11px; margin-top:15px;">Se precisar de ajuda urgente, ligue 188 (CVV).</p>
  `;
}

// Iniciar Onboarding
document.getElementById('userName').addEventListener('keypress', e => { if(e.key === 'Enter') saveUser(); });

</script>
</body>
</html>
