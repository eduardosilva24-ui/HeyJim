  /* SISTEMA DE DESIGN - HeyJim v2.0
     Foco: Calma, Acessibilidade e Imersão
  */
  :root {
    --sky: #c9e8f7;
    --sky-deep: #8ecae6;
    --peach: #fde8d8;
    --warm: #fff7f0;
    --gold: #f4a261;
    --gold-dark: #e07b3a;
    --mint: #a8dabc;
    --coral: #e07b6a;
    --text: #2d2214;
    --text-soft: #6b5744;
    --card-bg: rgba(255, 252, 248, 0.88);
    --shadow: 0 32px 80px rgba(80, 50, 20, 0.15);
    --radius: 32px;
    --radius-sm: 20px;
    --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #b8dff7 0%, #dff0f9 35%, #fde8d8 70%, #fff2e8 100%);
    padding: 20px;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Container Principal */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    height: 720px;
    background: var(--card-bg);
    backdrop-filter: blur(30px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Barra Superior */
  .top-bar {
    padding: 28px 28px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-family: 'DM Serif Display', serif; font-size: 22px; }

  /* Telas */
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 20px 32px 40px;
    animation: slideUp 0.7s ease forwards;
  }
  .screen.active { display: flex; }

  #scr-final {
    justify-content: center;
    align-items: center;
  }

  #final-body {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tipografia */
  h1 { font-family: 'DM Serif Display', serif; font-size: 32px; text-align: center; margin-bottom: 15px; }
  h2 { font-family: 'DM Serif Display', serif; font-size: 24px; text-align: center; margin-bottom: 12px; }
  .prose { font-size: 16px; line-height: 1.6; text-align: center; color: var(--text-soft); }

  /* Botões Customizados */
  .btn {
    width: 100%;
    padding: 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 12px;
  }
  .btn-primary { background: var(--gold); color: white; box-shadow: 0 10px 25px rgba(244,162,97,0.35); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(244,162,97,0.45); }
  .btn-ghost { background: rgba(0,0,0,0.04); color: var(--text); }
  .btn:active { transform: scale(0.96); }

  /* Grid de Escolhas */
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
  .choice-card {
    background: white;
    padding: 24px 15px;
    border-radius: var(--radius-sm);
    border: 1.5px solid transparent;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
  }
  .choice-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.06); }
  .choice-card .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

  /* Módulo de Respiração */
  .breath-circle-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .breath-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--sky-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 20px;
    transition: all 0s ease;
    box-shadow: 0 0 40px rgba(142,202,230,0.4);
  }
  .breath-circle.expand { transform: scale(1.6); background: var(--mint); }
  .breath-circle.contract { transform: scale(1); background: var(--coral); }

  /* Módulo de Grounding (Cores) */
  .ground-target {
    width: 220px;
    height: 220px;
    border-radius: 40px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    transition: all 0.6s ease;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);

    width: 100%;
    height: 200px;
    padding: 20px;
    border-radius: var(--radius-sm);
    border: 2px solid rgba(0,0,0,0.05);
    background: white;
    font-family: inherit;
    font-size: 16px;
    resize: none;
    outline: none;
    transition: var(--transition);

    color: var(--gold-dark);
    font-size: 14px;
    text-align: center;

const state = {

const API_BASE = "https://script.google.com/macros/s/AKfycbyqoVUlQyZHE9J51BKVElQTIx_i7ZBZFZ5fvknwqFr9Nh0hz42RrI0Zp5zvW0LCKpXa4g/exec";
const USER_STORAGE_PREFIX = "heyjim:user:";
const MUSIC_STORAGE_KEY = "heyjim:music-enabled";

let isFinishing = false;
let isLoggingIn = false;
window.__timers = window.__timers || [];

function registerTimer(timerId) {
  window.__timers.push(timerId);
  return timerId;
}

function unregisterTimer(timerId) {
  window.__timers = window.__timers.filter(id => id !== timerId);
}

function clearAllTimers() {
  window.__timers.forEach(timerId => {
    clearTimeout(timerId);
    clearInterval(timerId);
  });
  window.__timers = [];
}

function clearRegisteredTimer(timerId) {
  clearTimeout(timerId);
  clearInterval(timerId);
  unregisterTimer(timerId);
}

function safeSetTimeout(callback, delay) {
  const timerId = registerTimer(setTimeout(() => {
    unregisterTimer(timerId);
    if(!isFinishing) callback();
  }, delay));
  return timerId;
}

function safeSetInterval(callback, delay) {
  const timerId = registerTimer(setInterval(() => {
    if(!isFinishing) callback();
  }, delay));
  return timerId;
}

function safeDelay(delay, options = {}) {
  if(isFinishing && !options.allowDuringFinish) return Promise.resolve(false);
  return new Promise(resolve => {
    const timerId = registerTimer(setTimeout(() => {
      unregisterTimer(timerId);
      resolve(options.allowDuringFinish || !isFinishing);
    }, delay));
  });
}

function isChatActive(sessionId = state.sessionId) {
  const chatScreen = document.getElementById('scr-chat');
  return !isFinishing && state.sessionId === sessionId && chatScreen && chatScreen.classList.contains('active');
}

function storageKey(name = state.user) {
  return `${USER_STORAGE_PREFIX}${encodeURIComponent((name || "Amigo").trim().toLowerCase())}`;
}

function getLocalUser(name = state.user) {
  try {
    return JSON.parse(localStorage.getItem(storageKey(name)) || "null");
  } catch(error) {
    console.warn("Could not read local user state", error);
    return null;
  }
}

function saveLocalUser(data = {}) {
  try {
    const previous = getLocalUser(data.name || state.user) || {};
    localStorage.setItem(storageKey(data.name || state.user), JSON.stringify({
      ...previous,
      ...data,
      name: data.name || state.user,
      updatedAt: new Date().toISOString()
    }));
  } catch(error) {
    console.warn("Could not save local user state", error);
  }
}

async function fetchWithTimeout(url, timeout = 8000) {
  const controller = new AbortController();
  const timeoutId = registerTimer(setTimeout(() => controller.abort(), timeout));
  try {
    return await fetch(url, { method: "GET", cache: "no-store", signal: controller.signal });
  } finally {
    clearTimeout(timeoutId);
    unregisterTimer(timeoutId);
  }
}

const api = {
  async request(action, params = {}) {
    const query = new URLSearchParams({ action, ...params });
    const response = await fetchWithTimeout(`${API_BASE}?${query.toString()}`);
    const raw = await response.text();
    let data = {};

    try {
      data = raw ? JSON.parse(raw) : {};
    } catch(error) {
      data = { raw };
    }

    if(!response.ok) {
      throw new Error(data.error || `API ${action} failed with ${response.status}`);
    }

    state.apiOnline = true;
    return data;
  },
  login(name) {
    return this.request("login", { name });
  },
  update(name, payload = {}) {
    return this.request("update", {
      name,
      emotion: payload.emotion || "",
      activity: payload.activity || "",
      timeSpent: payload.timeSpent || 0,
      mood: payload.mood ?? "",
      completedAt: payload.completedAt || ""
    });
  },
  get(name) {
    return this.request("get", { name });
  }
};

  'suicidio', 'suicida', 'morrer', 'morte', 'matar', 'matá',
  'machucar', 'corte', 'lâmina', 'veneno', 'pílula', 'pílulas',
  'corda', 'enforcado', 'ahang', 'penhasco', 'carro', 'carro',
  'violar', 'estupro', 'violência', 'violento', 'agredir', 'espancado',
  'odeio', 'ódio', 'ninguém me ama', 'sem valor', 'inútil', 'fracasso',
  'nada importa', 'não vale a pena'
];

function containsHarmfulContent(text) {
  const lower = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  return HARMFUL_KEYWORDS.some(keyword => lower.includes(keyword));
}

/* --- NAVEGAÇÃO E BÁSICO --- */

function nextScreen(id) {
  const target = document.getElementById(id);
  if(!target) return;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  target.classList.add('active');
}

function updateMusicButton() {
  const button = document.getElementById('musicBtn');
  if(!button) return;
  button.style.opacity = state.music ? "1" : "0.5";
  button.title = state.music ? "Pausar musica" : "Tocar musica";
}

async function playMusic() {
  const audio = document.getElementById('bgm');
  if(!audio) return false;
  audio.volume = 0.35;
  audio.loop = true;
  state.music = true;
  updateMusicButton();
  localStorage.setItem(MUSIC_STORAGE_KEY, "on");

  try {
    await audio.play();
    return true;
  } catch(error) {
    if(error.name === "NotSupportedError") {
      state.music = false;
      updateMusicButton();
      console.warn("Background music source could not be played by this browser.", error);
    } else {
      console.warn("Autoplay blocked. Music will start after user interaction.", error);
    }
    return false;
  }
}

function pauseMusic() {
  const audio = document.getElementById('bgm');
  if(audio) audio.pause();
  state.music = false;
  updateMusicButton();
  localStorage.setItem(MUSIC_STORAGE_KEY, "off");
}

function toggleMusic() {
  const audio = document.getElementById('bgm');
  if(!audio) return;
  if(state.music && !audio.paused) {
    pauseMusic();
  } else {
    playMusic();
  }
}

function initMusic() {
  const audio = document.getElementById('bgm');
  if(!audio) return;
  audio.volume = 0.35;
  audio.loop = true;

  const storedPreference = localStorage.getItem(MUSIC_STORAGE_KEY);
  state.music = storedPreference !== "off";
  updateMusicButton();

  if(state.music) playMusic();

  const resumeMusic = event => {
    if(event.target && event.target.closest && event.target.closest('#musicBtn')) return;
    if(state.music && audio.paused) playMusic();
  };

  document.addEventListener('pointerdown', resumeMusic, { once: true });
  document.addEventListener('keydown', resumeMusic, { once: true });
  document.addEventListener('touchstart', resumeMusic, { once: true });
}

function setLoginLoading(isLoading) {
  const button = document.querySelector('#scr-login .btn-primary');
  if(!button) return;
  button.disabled = isLoading;
  button.style.opacity = isLoading ? "0.65" : "1";
  button.innerText = isLoading ? "Conectando..." : "Continuar";
}

async function syncUserOnLogin(name) {
  try {
    await api.login(name);
    const remoteUser = await api.get(name);
    saveLocalUser({ name, remoteUser, lastLoginAt: new Date().toISOString() });
    return remoteUser;
  } catch(error) {
    state.apiOnline = false;
    console.warn("API unavailable. Continuing with local fallback.", error);
    saveLocalUser({ name, offline: true, lastLoginAt: new Date().toISOString() });
    return getLocalUser(name);
  }
}

async function saveUser() {
  if(isFinishing || isLoggingIn) return;
  isLoggingIn = true;
  clearAllTimers();
  isFinishing = false;
  state.sessionId++;
  state.emotion = "";
  state.activity = "";
  state.activityQuiz = {};
  state.journalContent = "";
  state.completedAt = null;
  state.timeSpent = 0;

  const name = document.getElementById('userName').value.trim();
  state.user = name || "Amigo";
  state.timeStart = new Date();
  setLoginLoading(true);
  try {
    await syncUserOnLogin(state.user);
    nextScreen('scr-chat');
    startMainFlow();
  } finally {
    isLoggingIn = false;
    setLoginLoading(false);
  }
}

async function speak(text, delay = 1500) {
  const sessionId = state.sessionId;
  const body = document.getElementById('chat-body');
  const typing = document.getElementById('typing');
  if(!body || !typing || !isChatActive(sessionId)) return false;
  
  body.innerHTML = "";
  typing.style.display = "block";
  const shouldContinue = await safeDelay(delay);
  if(!shouldContinue || !body || !typing || !isChatActive(sessionId)) return false;
  typing.style.display = "none";
  
  const h = document.createElement('h2');
  h.innerText = text;
  body.appendChild(h);
  return true;
}

  const emojis = document.querySelectorAll('.mood-emoji');
  emojis.forEach((el,i)=> el.style.transform = (i===idx) ? 'translateY(-8px) scale(1.2)' : 'translateY(0) scale(1)' );

  label.innerText = T.pt.moodMeter.labels[idx];
  emojis.forEach((el,i)=> el.style.opacity = (i===idx) ? '1' : '0.5');

/* --- MÓDULO: RESPIRAÇÃO QUADRADA (2 minutos de duração simulada) --- */

function renderBreathingExercise() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <p class="prose" id="breath-instr">Prepare-se para inspirar...</p>
    <div class="breath-circle-wrap">
      <div class="breath-circle" id="b-circle">Aguarde</div>
      <div id="breath-controls" style="margin-top:14px;width:100%;display:flex;justify-content:center"></div>
    </div>
  `;
  
  let cycles = 0;
  const circle = document.getElementById('b-circle');
  const instr = document.getElementById('breath-instr');
  const controls = document.getElementById('breath-controls');
  
  // mínimo de ciclos: 2 para estados sobrecarregados/estressados, 4 caso contrário
  const minCycles = (state.emotion === 'stressed' || state.emotion === 'overwhelmed') ? 2 : 4;
  let finishBtnAdded = false;
  let animationTimeout = null;
  state.breathingActive = true;
  
  const runCycle = () => {
    if (!state.breathingActive) return;
    
    // Inspirar (4s)
    instr.innerText = T.pt.breath.inhale;
    circle.className = "breath-circle";
    circle.style.transition = "all 4s ease-in";
    circle.style.transform = "scale(1.6)";
    circle.style.background = "var(--mint)";
    circle.innerText = "Inspirar";
    
    animationTimeout = safeSetTimeout(() => {
      if (!state.breathingActive) return;
      
      // Segurar (4s)
      instr.innerText = T.pt.breath.hold;
      circle.style.transition = "none";
      circle.innerText = "Segurar";
      
      animationTimeout = safeSetTimeout(() => {
        if (!state.breathingActive) return;
        
        // Expirar (4s)
        instr.innerText = T.pt.breath.exhale;
        circle.style.transition = "all 4s ease-out";
        circle.style.transform = "scale(1)";
        circle.style.background = "var(--coral)";
        circle.innerText = "Expirar";
        
        animationTimeout = safeSetTimeout(() => {
          if (!state.breathingActive) return;
          
          // Pausa (4s)
          instr.innerText = T.pt.breath.pause;
          circle.style.transition = "none";
          circle.innerText = "Pausa";
          cycles++;

          if(cycles >= minCycles && !finishBtnAdded) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.style.width = '60%';
            btn.style.marginTop = '14px';
            btn.innerText = T.pt.breathingFinish;
            btn.onclick = () => {
              state.breathingActive = false;
              if(animationTimeout) clearRegisteredTimer(animationTimeout);
              startGrounding();
            };
            controls.appendChild(btn);
            finishBtnAdded = true;
            return;
          }

          animationTimeout = safeSetTimeout(runCycle, 4000);
        }, 4000);
      }, 4000);
    }, 4000);
  };
  
  safeSetTimeout(runCycle, 2000);
}

async function renderJournaling() {
  if(!(await speak("Para finalizar, escreva uma coisa que te deixou grato hoje, por menor que seja."))) return;
  const body = document.getElementById('chat-body');
  body.innerHTML = '';
  
  const area = document.createElement('textarea');
  area.className = "journal-box";
  area.id = "userJournal";
  area.placeholder = "Hoje eu me senti grato por...";
  body.appendChild(area);
  
  const errorMsg = document.createElement('p');
  errorMsg.id = 'journalError';
  errorMsg.style.color = 'var(--coral)';
  errorMsg.style.fontSize = '14px';
  errorMsg.style.textAlign = 'center';
  errorMsg.style.marginTop = '10px';
  errorMsg.style.display = 'none';
  body.appendChild(errorMsg);
  
  const btn = document.createElement('button');
  btn.className = "btn btn-primary";
  btn.innerText = "Terminei de escrever";
  btn.onclick = () => validateAndFinish();
  body.appendChild(btn);
}

function validateAndFinish() {
  const content = document.getElementById('userJournal').value.trim();
  const errorMsg = document.getElementById('journalError');
  
  if(!content) {
    errorMsg.innerText = "Por favor, escreva algo antes de continuar. Sua voz importa! 💬";
    errorMsg.style.display = 'block';
    return;
  }
  
  if(containsHarmfulContent(content)) {
    errorMsg.innerText = "Percebo que você está sofrendo. Seus sentimentos são válidos, mas estou aqui para apoiar, não para piorar. Se precise de ajuda profissional urgente, ligue 188 (CVV). 💚";
    errorMsg.style.display = 'block';
    return;
  }

  setJournalContent(content);
  finishSession();
}

  const errorMsg = document.createElement('p');
  errorMsg.id = 'smallVictoriesError';
  errorMsg.style.color = 'var(--coral)';
  errorMsg.style.fontSize = '14px';
  errorMsg.style.textAlign = 'center';
  errorMsg.style.marginTop = '10px';
  errorMsg.style.display = 'none';
  body.appendChild(errorMsg);

  const btn = document.createElement('button');

  btn.innerText = T.pt.smallVictories.button;
  btn.onclick = finishSmallVictories;
  body.appendChild(btn);

function finishSmallVictories(){
  const parts = [];
  let anyFilled = false;
  
  for(let i=1;i<=3;i++){
    const v = document.getElementById(`sv${i}`).value || '';
    if(v.trim()) {
      anyFilled = true;
      if(containsHarmfulContent(v)) {
        const errorMsg = document.getElementById('smallVictoriesError');
        errorMsg.innerText = "Percebi algo preocupante. Se você está sofrendo, saiba que não está sozinho. Ligue 188 (CVV) para conversar. 💚";
        errorMsg.style.display = 'block';
        return;
      }
      parts.push(v.trim());
    }
  }
  
  if(!anyFilled) {
    const errorMsg = document.getElementById('smallVictoriesError');
    errorMsg.innerText = "Por favor, escreva pelo menos uma coisa boa que você viveu! 💬";
    errorMsg.style.display = 'block';
    return;
  }
  
  const combined = parts.join(' \n ');
  setJournalContent(combined);
  finishSession();
}

  if(!(await speak("Vamos conectar você aos seus 5 sentidos. Isso traz você para o presente."))) return;

function renderFiveSenses() {
  const body = document.getElementById('chat-body');
  
  const senses = [
    { count: 5, sense: "coisas que você **vê**", emoji: "👀" },
    { count: 4, sense: "coisas que você **sente** no corpo", emoji: "🤚" },
    { count: 3, sense: "coisas que você **ouve**", emoji: "👂" },
    { count: 2, sense: "coisas que você **prova**", emoji: "👅" },
    { count: 1, sense: "coisas que você **cheira**", emoji: "👃" }
  ];

  let currentStep = 0;

  const displayStep = () => {
    if(currentStep >= senses.length) {
      setJournalContent('Completei o grounding dos 5 sentidos');
      finishSession();
      return;
    }
    const s = senses[currentStep];
    const stepNum = currentStep;
    body.innerHTML = `
      <p class="prose" style="font-size:20px; margin-bottom:20px;">${s.emoji}</p>
      <h2 style="font-size:20px;">Encontre ${s.count} coisas que você ${s.sense}</h2>
      <p class="prose" style="margin-top:16px; margin-bottom:20px;">Pense em coisas ao seu redor agora</p>
      <input type="text" id="sense-input" class="journal-box" style="height:80px;" placeholder="Descreva aqui..." />
      <button class="btn btn-primary" onclick="nextSenseStep(${stepNum})">Próximo ${stepNum + 1}/${senses.length}</button>
    `;
  };

  window.nextSenseStep = (step) => {
    currentStep = step + 1;
    displayStep();
  };

  displayStep();
}

async function startBreathing478() {
  if(!(await speak("A respiração 4-7-8 é uma técnica ancestral de relaxamento profundo."))) return;
  renderBreathing478();
}

function renderBreathing478() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <p class="prose" id="breath-478-instr">Prepare-se...</p>
    <div class="breath-circle-wrap">
      <div class="breath-circle" id="b-478-circle" style="font-size:24px;">Pronto</div>
      <div id="breath-478-controls" style="margin-top:14px;width:100%;display:flex;justify-content:center"></div>
    </div>
  `;
  
  let cycles = 0;
  const circle = document.getElementById('b-478-circle');
  const instr = document.getElementById('breath-478-instr');
  const controls = document.getElementById('breath-478-controls');
  const minCycles = 3;
  let finishBtnAdded = false;
  let animationTimeout = null;
  
  const runCycle = () => {
    // 4s inspirar
    instr.innerText = "Inspire por 4 segundos";
    circle.style.transition = "all 4s ease-in";
    circle.style.transform = "scale(1.5)";
    circle.style.background = "var(--mint)";
    circle.innerText = "4";
    
    animationTimeout = safeSetTimeout(() => {
      // 7s segurar
      instr.innerText = "Segure por 7 segundos";
      circle.style.transition = "none";
      circle.style.background = "var(--sky-deep)";
      circle.innerText = "7";
      
      animationTimeout = safeSetTimeout(() => {
        // 8s expirar
        instr.innerText = "Expire por 8 segundos";
        circle.style.transition = "all 8s ease-out";
        circle.style.transform = "scale(1)";
        circle.style.background = "var(--coral)";
        circle.innerText = "8";
        
        animationTimeout = safeSetTimeout(() => {
          cycles++;
          if(cycles >= minCycles && !finishBtnAdded) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.style.width = '60%';
            btn.innerText = 'Terminei - Estou mais calmo';
            btn.onclick = () => {
              finishSession();
            };
            controls.appendChild(btn);
            finishBtnAdded = true;
            return;
          }
          animationTimeout = safeSetTimeout(runCycle, 2000);
        }, 8000);
      }, 7000);
    }, 4000);
  };
  
  safeSetTimeout(runCycle, 1500);
}

function normalizeActivityText(text) {
  return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function getActivityTags(name, level) {
  const text = normalizeActivityText(name);
  const tags = new Set();

  if(/caminh|along|yoga|dancar|corrida|escalada|exercicios|treino|trilhas|massagear/.test(text)) tags.add("movement");
  if(/ar livre|plantas|ceu|chuva|natureza|sol|parque|jardin|horta|trilhas/.test(text)) tags.add("nature");
  if(/desenhar|colorir|pintar|aquarela|croche|origami|artesanato|historias|arte|foto|fotograf|design|video|audiovisual|blog|livro|aplicativo|projeto|canal|musica|playlist|velas|caligrafia|cozinhar|receitas/.test(text)) tags.add("creative");
  if(/escrever|diario|lista|cartas|livro|blog/.test(text)) tags.add("writing");
  if(/respir|meditacao|mindfulness|silencio|atencao|gratidao|pausa|sem celular|relax|massag|cha|banho|texturas|observar|agradecer/.test(text)) tags.add("mindfulness");
  if(/ouvir|assistir|ler|cha|banho|relax|deitado|podcast|filmes|videos|agua|comer|sons/.test(text)) tags.add("comfort");
  if(/organizar|arrumar|planejamento|habitos|estudar|aprender|programacao|idioma|quebra-cabeca|maratona|rotina/.test(text)) tags.add("focus");
  if(/aprender|estudar|idioma|programacao|violao|teclado|caligrafia/.test(text)) tags.add("learning");
  if(level === "hard" || /projeto|blog|livro|aplicativo|canal|producao|design|rotina|voluntariado/.test(text)) tags.add("project");
  if(/pessoas|teatro|voluntariado|social/.test(text)) tags.add("social");

  return Array.from(tags);
}

function answerActivityQuiz(optionIndex) {
  const step = state.activityQuiz.step || 0;
  const question = ACTIVITY_QUIZ[step];
  state.activityQuiz.answers[question.id] = question.options[optionIndex];
  state.activityQuiz.step = step + 1;

  if(state.activityQuiz.step >= ACTIVITY_QUIZ.length) {
    renderActivityRecommendations();
    return;
  }

  renderActivityQuiz();
}

function getEmotionActivityBias() {
  const bias = {
    levels: { simple: 0, medium: 0, hard: 0 },
    tags: {}
  };

  const addTags = tags => Object.entries(tags).forEach(([tag, value]) => {
    bias.tags[tag] = (bias.tags[tag] || 0) + value;
  });

  if(state.emotion === "anxious") {
    bias.levels.simple += 3;
    bias.levels.medium += 1;
    addTags({ mindfulness: 4, nature: 3, comfort: 2, writing: 1 });
  } else if(state.emotion === "sad") {
    bias.levels.simple += 2;
    bias.levels.medium += 2;
    addTags({ comfort: 3, creative: 3, nature: 2, writing: 2, social: 1 });
  } else if(state.emotion === "stressed") {
    bias.levels.simple += 2;
    bias.levels.medium += 2;
    addTags({ mindfulness: 4, movement: 3, nature: 2, comfort: 2, focus: 1 });
  } else if(state.emotion === "overwhelmed") {
    bias.levels.simple += 3;
    bias.levels.medium += 1;
    addTags({ mindfulness: 4, focus: 3, comfort: 2, nature: 2, writing: 1 });
  }

  const mood = Number(state.mood);
  if(!Number.isNaN(mood)) {
    if(mood <= 1) {
      bias.levels.simple += 2;
      addTags({ comfort: 2, mindfulness: 2 });
    } else if(mood >= 3) {
      bias.levels.medium += 1;
      bias.levels.hard += 1;
      addTags({ movement: 1, project: 1, learning: 1 });
    }
  }

  return bias;
}

function scoreActivity(item) {
  const answers = Object.values(state.activityQuiz.answers || {});
  const levelScores = { simple: 0, medium: 0, hard: 0 };
  const tagScores = {};
  const bias = getEmotionActivityBias();

  answers.forEach(answer => {
    (answer.levels || []).forEach(level => levelScores[level] += 3);
    (answer.tags || []).forEach(tag => tagScores[tag] = (tagScores[tag] || 0) + 4);
  });

  let score = 1 + levelScores[item.level] + bias.levels[item.level];
  item.tags.forEach(tag => {
    score += tagScores[tag] || 0;
    score += bias.tags[tag] || 0;
  });

  if(item.level === "simple") score += 0.8;
  if(item.tags.length === 0) score -= 1;
  return score;
}

function recommendActivities(limit = 10) {
  return ACTIVITY_LIBRARY
    .map(item => ({ ...item, score: scoreActivity(item) }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
    .slice(0, limit);
}

function tagLabel(tag) {
  const labels = {
    movement: "movimento",
    nature: "natureza",
    creative: "criatividade",
    writing: "escrita",
    mindfulness: "calma",
    comfort: "acolhimento",
    focus: "organização",
    learning: "aprendizado",
    project: "projeto",
    social: "conexão"
  };
  return labels[tag] || tag;
}

function activityReason(item) {
  const primaryTags = item.tags.slice(0, 2).map(tagLabel).join(" e ");
  const level = ACTIVITY_LEVELS[item.level].label.toLowerCase();
  if(primaryTags) return `Combina com seu momento por ser uma atividade ${level} ligada a ${primaryTags}.`;
  return `Combina com seu momento por ser uma atividade ${level} e fácil de adaptar.`;
}

function renderActivityRecommendations() {
  const finalBody = getFinalBody();
  if(!finalBody) return;

  const recommendations = recommendActivities(10);
  finalBody.innerHTML = `
    <div class="activity-panel">
      <div class="quiz-progress">Suas 10 atividades</div>
      <h2>Próximos passos gentis</h2>
      <p class="prose">Escolha uma só para começar. A meta é presença, não performance.</p>
      <div style="margin-top:14px;">
        ${recommendations.map(item => `
          <div class="activity-card">
            <span class="difficulty-pill difficulty-${item.level}">${ACTIVITY_LEVELS[item.level].emoji} ${ACTIVITY_LEVELS[item.level].label}</span>
            <strong>${escapeHTML(item.name)}</strong>
            <div class="activity-reason">${activityReason(item)}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn btn-primary" onclick="openActivityQuiz()">Refazer quiz</button>
      <button class="btn btn-ghost" onclick="renderFullActivityList()">Ver lista completa</button>
      <button class="btn btn-ghost" onclick="renderFinalScreen(state.timeSpent || 1)">Voltar ao final</button>
    </div>
  `;
}

function renderFullActivityList() {
  const finalBody = getFinalBody();
  if(!finalBody) return;

  finalBody.innerHTML = `
    <div class="activity-panel">
      <div class="quiz-progress">Biblioteca de atividades</div>
      <h2>Escolha pelo tamanho do passo</h2>
      <p class="prose">A lista completa fica aqui para quando você quiser explorar sem pressão.</p>
      ${Object.entries(ACTIVITY_GROUPS).map(([level, names]) => `
        <div class="activity-list-group">
          <h3>${ACTIVITY_LEVELS[level].emoji} ${ACTIVITY_LEVELS[level].label}</h3>
          <div class="activity-chip-list">
            ${names.map(name => `<span class="activity-chip">${escapeHTML(name)}</span>`).join('')}
          </div>
        </div>
      `).join('')}
      <button class="btn btn-primary" onclick="openActivityQuiz()">Fazer quiz</button>
      <button class="btn btn-ghost" onclick="renderFinalScreen(state.timeSpent || 1)">Voltar ao final</button>
    </div>
  `;
}

/* --- FINALIZAÇÃO --- */

function ensureUserJournal() {
  if(!document.getElementById('userJournal')) {
    const area = document.createElement('textarea');
    area.id = 'userJournal';
    area.style.display = 'none';
    document.body.appendChild(area);
  }
}

function setJournalContent(content) {
  state.journalContent = content || "";
  const journal = document.getElementById('userJournal');
  if(journal) journal.value = state.journalContent;
}

function getJournalContent() {
  const journal = document.getElementById('userJournal');
  const content = journal ? journal.value : state.journalContent;
  return (content || "").trim() || "Atividade completada com sucesso";
}

function buildSessionPayload(content) {
  const startedAt = state.timeStart ? new Date(state.timeStart) : new Date();
  state.timeSpent = Math.max(1, Math.round((new Date() - startedAt) / 60000));
  state.completedAt = new Date().toISOString();

  return {
    name: state.user || "Amigo",
    emotion: state.emotion || "",
    activity: state.activity || "Atividade completada",
    mood: state.mood ?? "",
    timeSpent: state.timeSpent,
    completedAt: state.completedAt,
    journalContent: content
  };
}

async function persistSession(payload) {
  saveLocalUser({ ...payload, pendingSync: true });

  try {
    await api.update(payload.name, payload);
    saveLocalUser({ ...payload, pendingSync: false, syncedAt: new Date().toISOString() });
  } catch(error) {
    state.apiOnline = false;
    console.warn("Could not sync session. Local fallback saved.", error);
    saveLocalUser({ ...payload, pendingSync: true, syncError: error.message });
  }
}

function finishSession() {
  if(isFinishing) return;
  isFinishing = true;
  state.breathingActive = false;
  clearAllTimers();

  try {
    ensureUserJournal();
    const content = getJournalContent();
    setJournalContent(content);
    const payload = buildSessionPayload(content);
    const typing = document.getElementById('typing');

    if(typing) typing.style.display = "none";
    nextScreen('scr-final');
    renderFinalScreen(payload.timeSpent);
    persistSession(payload);
  } catch(error) {
    console.error('Erro em finishSession:', error);
    nextScreen('scr-final');
    renderFinalScreen(state.timeSpent || 1);
  }
}

function renderFinalScreen(timeSpent = 1) {
  const finalBody = document.getElementById('final-body');
  if(!finalBody) {
    console.error('final-body não encontrado');
    return;
  }
  finalBody.style.justifyContent = "center";
  finalBody.style.alignItems = "center";
  finalBody.style.overflowY = "auto";

  finalBody.innerHTML = `
    <div class="jim-icon">🌤️</div>
    <h2>Orgulho de você, ${state.user}.</h2>
    <p class="prose">Você dedicou cerca de ${timeSpent} minuto(s) para cuidar de si mesmo. Isso é mais do que a maioria das pessoas faz em uma semana inteira.</p>
    <div class="end-card" style="margin-top:20px; padding:20px; background:rgba(168,218,188,0.2); border-radius:15px; margin-bottom:20px;">
        <p class="prose" style="font-size:14px; color: #2d8c45; margin-bottom:8px;">"O que você compartilhou ficará guardado no seu coração."</p>
        <p class="prose" style="font-size:13px; color: var(--text-soft); font-style: italic;">Você é mais forte do que pensa. 💚</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
      <button class="btn btn-primary" onclick="openActivityQuiz()">Receber 10 atividades recomendadas</button>
      <button class="btn btn-ghost" onclick="renderFullActivityList()">Ver lista completa de atividades</button>
      <button class="btn btn-ghost" onclick="backToWelcome()">Fazer novo Check-in</button>
      <button class="btn btn-ghost" onclick="exitApp()">Sair</button>
    </div>
    <p class="prose" style="font-size:11px; margin-top:15px;">Se precisar de ajuda urgente, ligue 188 (CVV).</p>
  `;
}

// Iniciar Onboarding - com proteção para carregamento do DOM
document.addEventListener('DOMContentLoaded', function() {
  initMusic();
  const userNameField = document.getElementById('userName');
  if(userNameField) {
    userNameField.addEventListener('keypress', e => {
      if(e.key === 'Enter') saveUser();
    });
  }
});

function backToWelcome() {
  clearAllTimers();
  isFinishing = false;
  state.sessionId++;

  // Reset do estado
  state.user = "";
  state.emotion = "";
  state.path = "";
  state.activity = "";
  state.activityQuiz = {};
  state.mood = null;
  state.groundingIndex = 0;
  state.journalContent = "";
  state.timeStart = null;
  state.timeSpent = 0;
  state.completedAt = null;
  state.breathingActive = false;
  
  // Limpa campos
  const userNameField = document.getElementById('userName');
  if(userNameField) userNameField.value = '';
  document.querySelectorAll('#userJournal').forEach(el => el.remove());
  
  // Volta para tela de bem-vindo
  nextScreen('scr-welcome');
}

function exitApp() {
  clearAllTimers();
  state.breathingActive = false;

  // Mostra mensagem de despedida
  nextScreen('scr-final');
  const finalBody = document.getElementById('final-body');
  if(finalBody) {
    finalBody.style.justifyContent = "center";
    finalBody.style.alignItems = "center";
    finalBody.style.overflowY = "auto";
    finalBody.innerHTML = `
      <div class="jim-icon" style="animation: none; margin-bottom: 20px;">👋</div>
      <h2>Até em breve!</h2>
      <p class="prose">Lembre-se: você merece cuidado, especialmente de si mesmo.</p>
      <p class="prose" style="margin-top:15px; font-size:14px; color: var(--gold-dark); font-weight:600;">Volte sempre que precisar. Estarei aqui. 💚</p>
      <div style="height:30px;"></div>
      <button class="btn btn-ghost" onclick="backToWelcome()">Voltar</button>
    `;
  }
}

</script>
