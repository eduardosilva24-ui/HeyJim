<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyJim - Cuidado Emocional Profundo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* SISTEMA DE DESIGN - HeyJim v2.0
     Foco: Calma, Acessibilidade e Imersão
  */
  :root {
    --sky: #c9e8f7;
    --sky-deep: #8ecae6;
    --peach: #fde8d8;
    --warm: #fff7f0;
    --gold: #f4a261;
    --gold-dark: #e07b3a;
    --mint: #a8dabc;
    --coral: #e07b6a;
    --text: #2d2214;
    --text-soft: #6b5744;
    --card-bg: rgba(255, 252, 248, 0.88);
    --shadow: 0 32px 80px rgba(80, 50, 20, 0.15);
    --radius: 32px;
    --radius-sm: 20px;
    --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #b8dff7 0%, #dff0f9 35%, #fde8d8 70%, #fff2e8 100%);
    padding: 20px;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Container Principal */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    height: 720px;
    background: var(--card-bg);
    backdrop-filter: blur(30px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Barra Superior */
  .top-bar {
    padding: 28px 28px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-family: 'DM Serif Display', serif; font-size: 22px; }

  /* Telas */
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 20px 32px 40px;
    animation: slideUp 0.7s ease forwards;
  }
  .screen.active { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tipografia */
  h1 { font-family: 'DM Serif Display', serif; font-size: 32px; text-align: center; margin-bottom: 15px; }
  h2 { font-family: 'DM Serif Display', serif; font-size: 24px; text-align: center; margin-bottom: 12px; }
  .prose { font-size: 16px; line-height: 1.6; text-align: center; color: var(--text-soft); }

  /* Botões Customizados */
  .btn {
    width: 100%;
    padding: 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 12px;
  }
  .btn-primary { background: var(--gold); color: white; box-shadow: 0 10px 25px rgba(244,162,97,0.35); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(244,162,97,0.45); }
  .btn-ghost { background: rgba(0,0,0,0.04); color: var(--text); }
  .btn:active { transform: scale(0.96); }

  /* Grid de Escolhas */
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
  .choice-card {
    background: white;
    padding: 24px 15px;
    border-radius: var(--radius-sm);
    border: 1.5px solid transparent;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
  }
  .choice-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.06); }
  .choice-card .emoji { font-size: 32px; display: block; margin-bottom: 10px; }

  /* Módulo de Respiração */
  .breath-circle-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .breath-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--sky-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 20px;
    transition: all 4s linear;
    box-shadow: 0 0 40px rgba(142,202,230,0.4);
  }
  .breath-circle.expand { transform: scale(1.6); background: var(--mint); }
  .breath-circle.contract { transform: scale(1); background: var(--coral); }

  /* Módulo de Grounding (Cores) */
  .ground-target {
    width: 220px;
    height: 220px;
    border-radius: 40px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    transition: all 0.6s ease;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
  }

  /* Módulo de Diário */
  .journal-box {
    width: 100%;
    height: 200px;
    padding: 20px;
    border-radius: var(--radius-sm);
    border: 2px solid rgba(0,0,0,0.05);
    background: white;
    font-family: inherit;
    font-size: 16px;
    resize: none;
    outline: none;
    transition: var(--transition);
  }
  .journal-box:focus { border-color: var(--gold); box-shadow: 0 0 0 5px rgba(244,162,97,0.1); }

  /* Indicador de "Jim pensando" */
  .typing {
    padding: 10px;
    font-style: italic;
    color: var(--gold-dark);
    font-size: 14px;
    text-align: center;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .jim-icon { font-size: 80px; animation: float 4s ease-in-out infinite; text-align: center; margin: 20px 0; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
.small-victory-input{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(0,0,0,0.06);margin-top:12px;background:rgba(255,255,255,0.92);font-family:inherit;box-shadow:0 8px 20px rgba(0,0,0,0.04)}

/* Respiração: animação suave do círculo (4s in, 4s hold, 4s out) */
@keyframes breathCycle {
  0%{transform:scale(1);background:var(--coral)}
  33%{transform:scale(1.6);background:var(--mint)}
  66%{transform:scale(1.6);background:var(--mint)}
  100%{transform:scale(1);background:var(--coral)}
}
.breath-circle.animate{animation:breathCycle 12s linear infinite}

.breath-circle-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Ajustes visuais para o botão de terminar respiração */
#breath-controls .btn{border-radius:20px}

/* Mood Meter styles */
.mood-meter{width:100%;max-width:360px;margin:12px auto;background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.9));padding:14px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,0.06);border:1px solid rgba(255,255,255,0.6)}
.emoji-row{display:flex;justify-content:space-between;margin-bottom:8px;padding:0 8px}
.mood-emoji{font-size:26px;transition:transform 0.25s ease, opacity 0.25s ease;cursor:pointer;user-select:none;padding:8px;border-radius:12px;background:rgba(255,255,255,0.4)}
#moodRange{width:100%;-webkit-appearance:none;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--mint),var(--gold));outline:none;margin-top:8px}
#moodRange::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:white;box-shadow:0 6px 18px rgba(0,0,0,0.12);border:3px solid rgba(255,255,255,0.6);cursor:pointer}
.mood-label{margin-top:8px;font-weight:600;color:var(--text-soft)}
.mood-emoji:hover{transform:translateY(-6px) scale(1.15)}

</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="brand">HeyJim</div>
    <div id="musicBtn" style="cursor:pointer; font-size: 20px;" onclick="toggleMusic()">🎵</div>
  </div>

  <div class="screen active" id="scr-welcome">
    <div class="jim-icon">🤖</div>
    <h1>Olá! Eu sou o Jim.</h1>
    <p class="prose">Serei seu guia pelos próximos 5 minutos. Não sou um robô de respostas prontas, sou um espaço para você respirar.</p>
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="nextScreen('scr-login')">Vamos começar</button>
  </div>

  <div class="screen" id="scr-login">
    <h2>Como posso te chamar?</h2>
    <p class="prose">Gosto de personalizar nossa conversa.</p>
    <input type="text" id="userName" class="btn btn-ghost" style="text-align:center; background:white; border: 1px solid #ddd;" placeholder="Seu nome aqui...">
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="saveUser()">Continuar →</button>
  </div>

  <div class="screen" id="scr-chat">
    <div id="typing" class="typing" style="display:none;">Jim está processando sua energia...</div>
    <div id="chat-body" style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      </div>
  </div>
</div>

<audio id="bgm" loop src="https://docs.google.com/uc?export=open&id=1Td3OLZVvYA-kgyzbUiFAqSvdazzsZbHs"></audio>

<script>
/**
 * HeyJim Core Script v2.0
 * Um complexo sistema de estados para simular uma sessão de terapia/apoio de 5-6 minutos.
 */

const state = {
  user: "",
  emotion: "",
  path: "",
  music: false,
  groundingIndex: 0,
  journalContent: "",
  timeStart: null
};

// Dados de Localização e Conteúdo
const CONTENT = {
  pt: {
    initial: "Como está seu coração neste exato momento?",
    emotions: [
      { id: "anxious", label: "Ansioso / Acelerado", emoji: "🌪️" },
      { id: "sad", label: "Triste / Desanimado", emoji: "🌧️" },
      { id: "stressed", label: "Estressado / Pressão", emoji: "💥" },
      { id: "overwhelmed", label: "Sobrecarregado", emoji: "🌊" }
    ],
    anxiousPath: [
      "Eu sinto sua pressa. Vamos tentar algo físico? Onde você sente essa ansiedade no corpo?",
      { options: ["No peito", "Na cabeça", "Nas mãos", "Em todo lugar"] },
      "Entendi. Vamos praticar a Ancoragem 5-4-3-2-1 para trazer você de volta ao agora."
    ],
    colors: [
      { name: "Azul", hex: "#5b9bd5", emoji: "🌊" },
      { name: "Verde", hex: "#4caf74", emoji: "🌿" },
      { name: "Amarelo", hex: "#fbc02d", emoji: "☀️" },
      { name: "Vermelho", hex: "#e05252", emoji: "🍎" },
      { name: "Roxo", hex: "#9575cd", emoji: "🔮" },
      { name: "Laranja", hex: "#ff9800", emoji: "🍊" },
      { name: "Rosa", hex: "#e91e63", emoji: "🌸" }
    ]
  }
};

const T = {
  pt: {
    awarenessTitle: "Maio Verde — Mês da Consciencialização da Saúde Mental",
    awarenessLine1: "Surgiu em 1949 pela Mental Health America para reduzir o estigma e celebrar a recuperação.",
    awarenessLine2: "O HeyJim é um porto seguro imediato — aqui ninguém enfrenta momentos difíceis sozinho.",
    awarenessButton: "Continuar",
    breath: {
      inhale: "Inspire profundamente...",
      hold: "Segure o ar...",
      exhale: "Solte devagar pelo nariz...",
      pause: "Aguarde o próximo ciclo..."
    },
    smallVictories: {
      title: "Pequenas Vitórias",
      placeholders: ["Uma coisa boa nº1...", "Uma coisa boa nº2...", "Uma coisa boa nº3..."],
      button: "Concluir e finalizar"
    },
    breathingFinish: "Terminar exercício",
    moodMeter: {
      title: "Como você está agora?",
      prompt: "Arraste o emoji que melhor representa seu humor",
      emojis: ["😭","😟","😐","🙂","😄"],
      labels: ["Muito mal","Mal","Neutro","Bem","Ótimo"],
      confirm: "Confirmar humor",
      skip: "Pular",
      thanks: "Obrigado por compartilhar."
    }
  },
  en: {
    awarenessTitle: "Green May — Mental Health Awareness Month",
    awarenessLine1: "Started in 1949 by Mental Health America to reduce stigma and celebrate recovery.",
    awarenessLine2: "HeyJim was created as an immediate safe harbor so no one faces hard moments alone.",
    awarenessButton: "Continue",
    breath: {
      inhale: "Breathe in deeply...",
      hold: "Hold the breath...",
      exhale: "Exhale slowly through the nose...",
      pause: "Wait for the next cycle..."
    },
    smallVictories: {
      title: "Small Victories",
      placeholders: ["One good thing #1...","One good thing #2...","One good thing #3..."],
      button: "Finish and close"
    },
    breathingFinish: "Finish exercise",
    moodMeter: {
      title: "How are you feeling now?",
      prompt: "Slide the emoji that best matches your mood",
      emojis: ["😭","😟","😐","🙂","😄"],
      labels: ["Very bad","Bad","Neutral","Good","Great"],
      confirm: "Confirm mood",
      skip: "Skip",
      thanks: "Thanks for sharing."
    }
  }
};

/* --- NAVEGAÇÃO E BÁSICO --- */

function nextScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleMusic() {
  const audio = document.getElementById('bgm');
  state.music = !state.music;
  state.music ? audio.play() : audio.pause();
  document.getElementById('musicBtn').style.opacity = state.music ? "1" : "0.5";
}

function saveUser() {
  const name = document.getElementById('userName').value.trim();
  state.user = name || "Amigo";
  state.timeStart = new Date();
  nextScreen('scr-chat');
  startMainFlow();
}

/* --- FLUXO PRINCIPAL (A LÓGICA QUE CONSOME TEMPO) --- */

async function speak(text, delay = 1500) {
  const body = document.getElementById('chat-body');
  const typing = document.getElementById('typing');
  
  body.innerHTML = "";
  typing.style.display = "block";
  await new Promise(r => setTimeout(r, delay));
  typing.style.display = "none";
  
  const h = document.createElement('h2');
  h.innerText = text;
  body.appendChild(h);
}

async function startMainFlow() {
  // Mostrar introdução do Maio Verde antes do fluxo principal
  renderAwarenessIntro();
}

function renderAwarenessIntro() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div style="text-align:center; padding:10px">
      <h2>${T.pt.awarenessTitle}</h2>
      <p class="prose" style="margin-top:10px;">${T.pt.awarenessLine1}</p>
      <p class="prose" style="margin-top:6px;">${T.pt.awarenessLine2}</p>
      <div style="height:18px"></div>
      <div class="jim-icon" style="font-size:60px">💚</div>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="startMainFlowContinue()">${T.pt.awarenessButton}</button>
    </div>
  `;
}

// --- Mood Meter (Emoji Slider) ---
function renderMoodMeter(){
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div style="text-align:center; padding:6px">
      <h2>${T.pt.moodMeter.title}</h2>
      <p class="prose" style="margin-top:8px;">${T.pt.moodMeter.prompt}</p>
      <div style="height:10px"></div>
      <div class="mood-meter" id="moodMeter">
        <div class="emoji-row" id="emojiRow"></div>
        <input type="range" min="0" max="4" value="2" step="1" id="moodRange" />
        <div class="mood-label" id="moodLabel"></div>
      </div>
      <div style="height:10px"></div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-ghost" onclick="showEmotionGrid()">${T.pt.moodMeter.skip}</button>
        <button class="btn btn-primary" onclick="handleMoodConfirm()">${T.pt.moodMeter.confirm}</button>
      </div>
    </div>
  `;

  // render emojis
  const row = document.getElementById('emojiRow');
  T.pt.moodMeter.emojis.forEach((e, idx) => {
    const span = document.createElement('div');
    span.className = 'mood-emoji';
    span.innerText = e;
    span.dataset.idx = idx;
    span.onclick = () => { document.getElementById('moodRange').value = idx; updateMoodUI(idx); };
    row.appendChild(span);
  });

  const range = document.getElementById('moodRange');
  range.oninput = (ev) => updateMoodUI(ev.target.value);
  updateMoodUI(range.value);
}

function updateMoodUI(idx){
  idx = Number(idx);
  const emojis = document.querySelectorAll('.mood-emoji');
  emojis.forEach((el,i)=> el.style.transform = (i===idx) ? 'translateY(-8px) scale(1.2)' : 'translateY(0) scale(1)' );
  const label = document.getElementById('moodLabel');
  label.innerText = T.pt.moodMeter.labels[idx];
  emojis.forEach((el,i)=> el.style.opacity = (i===idx) ? '1' : '0.5');
}

function handleMoodConfirm(){
  const idx = document.getElementById('moodRange').value;
  state.mood = idx;
  speak(T.pt.moodMeter.thanks).then(() => { showEmotionGrid(); });
}

function showEmotionGrid(){
  const body = document.getElementById('chat-body');
  body.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'choice-grid';
  CONTENT.pt.emotions.forEach(emo => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = `<span class="emoji">${emo.emoji}</span>${emo.label}`;
    card.onclick = () => handleEmotionSelection(emo.id);
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

async function startMainFlowContinue() {
  await speak(`Olá, ${state.user}. Que bom que você parou um pouco.`);
  await speak(CONTENT.pt.initial);
  // Primeiro passo interativo: Mood Meter
  renderMoodMeter();
}

async function handleEmotionSelection(id) {
  state.emotion = id;
  
  if(id === 'anxious' || id === 'stressed') {
    await speak("Quando a mente corre, o corpo sofre. Vamos começar com a Respiração Quadrada.");
    renderBreathingExercise();
  } else if(id === 'sad') {
    await speak("Às vezes as palavras ajudam a esvaziar o que está cheio demais.");
    renderSmallVictories();
  } else if(id === 'overwhelmed') {
    await speak("Às vezes as palavras ajudam a esvaziar o que está cheio demais.");
    renderJournaling();
  }
}

/* --- MÓDULO: RESPIRAÇÃO QUADRADA (2 minutos de duração simulada) --- */

function renderBreathingExercise() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <p class="prose" id="breath-instr">Prepare-se para inspirar...</p>
    <div class="breath-circle-wrap">
      <div class="breath-circle" id="b-circle">Aguarde</div>
      <div id="breath-controls" style="margin-top:14px;width:100%;display:flex;justify-content:center"></div>
    </div>
  `;
  
  let cycles = 0;
  const circle = document.getElementById('b-circle');
  const instr = document.getElementById('breath-instr');
  const controls = document.getElementById('breath-controls');
  
  // mínimo de ciclos: 2 para estados sobrecarregados/estressados, 4 caso contrário
  const minCycles = (state.emotion === 'stressed' || state.emotion === 'overwhelmed') ? 2 : 4;
  let finishBtnAdded = false;
  
  const runCycle = () => {
    // Inspirar (4s)
    instr.innerText = T.pt.breath.inhale;
    circle.className = "breath-circle expand animate";
    circle.innerText = "Inspirar";
    
    setTimeout(() => {
      // Segurar (4s)
      instr.innerText = T.pt.breath.hold;
      circle.innerText = "Segurar";
      
      setTimeout(() => {
        // Expirar (4s)
        instr.innerText = T.pt.breath.exhale;
        circle.className = "breath-circle contract animate";
        circle.innerText = "Expirar";
        
        setTimeout(() => {
          // Pausa (4s)
          instr.innerText = T.pt.breath.pause;
          circle.innerText = "Pausa";
          cycles++;

          if(cycles >= minCycles && !finishBtnAdded) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.style.width = '60%';
            btn.style.marginTop = '14px';
            btn.innerText = T.pt.breathingFinish;
            btn.onclick = () => startGrounding();
            controls.appendChild(btn);
            finishBtnAdded = true;
            return; // espera que o usuário clique
          }

          setTimeout(runCycle, 4000);
        }, 4000);
      }, 4000);
    }, 4000);
  };
  
  setTimeout(runCycle, 2000);
}

/* --- MÓDULO: ANCORAGEM DE CORES (Aumentado para 7 cores) --- */

async function startGrounding() {
  state.groundingIndex = 0;
  await speak("Agora, vamos conectar seus olhos com o mundo ao seu redor.");
  renderGroundingStep();
}

function renderGroundingStep() {
  const color = CONTENT.pt.colors[state.groundingIndex];
  const body = document.getElementById('chat-body');
  
  body.innerHTML = `
    <p class="prose">Observe o ambiente. Encontre algo na cor:</p>
    <div class="ground-target" style="background-color: ${color.hex}">
      <span>${color.emoji}</span>
      <p style="margin-top:10px">${color.name}</p>
    </div>
    <button class="btn btn-primary" onclick="nextGroundingStep()">Encontrei!</button>
  `;
}

function nextGroundingStep() {
  state.groundingIndex++;
  if(state.groundingIndex < CONTENT.pt.colors.length) {
    renderGroundingStep();
  } else {
    renderJournaling();
  }
}

/* --- MÓDULO: DIÁRIO REFLEXIVO --- */

async function renderJournaling() {
  await speak("Para finalizar, escreva uma coisa que te deixou grato hoje, por menor que seja.");
  const body = document.getElementById('chat-body');
  
  const area = document.createElement('textarea');
  area.className = "journal-box";
  area.id = "userJournal";
  area.placeholder = "Hoje eu me senti grato por...";
  body.appendChild(area);
  
  const btn = document.createElement('button');
  btn.className = "btn btn-primary";
  btn.innerText = "Terminei de escrever";
  btn.onclick = finishSession;
  body.appendChild(btn);
}

// Pequenas Vitórias — atividade interativa para emoções de tristeza
async function renderSmallVictories() {
  await speak(T.pt.smallVictories.title);
  const body = document.getElementById('chat-body');
  body.innerHTML = `<h2>${T.pt.smallVictories.title}</h2>`;

  // Campos de input
  for(let i=1;i<=3;i++){
    const input = document.createElement('input');
    input.type = 'text';
    input.id = `sv${i}`;
    input.className = 'small-victory-input';
    input.placeholder = T.pt.smallVictories.placeholders[i-1];
    body.appendChild(input);
  }

  // Campo oculto para manter compatibilidade com finishSession
  const hidden = document.createElement('textarea');
  hidden.id = 'userJournal';
  hidden.style.display = 'none';
  body.appendChild(hidden);

  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.innerText = T.pt.smallVictories.button;
  btn.onclick = finishSmallVictories;
  body.appendChild(btn);
}

function finishSmallVictories(){
  const parts = [];
  for(let i=1;i<=3;i++){
    const v = document.getElementById(`sv${i}`).value || '';
    if(v.trim()) parts.push(v.trim());
  }
  const combined = parts.join(' \n ');
  const hidden = document.getElementById('userJournal');
  if(hidden) hidden.value = combined;
  finishSession();
}

/* --- FINALIZAÇÃO --- */

async function finishSession() {
  const content = document.getElementById('userJournal').value;
  await speak("Processando suas reflexões...");
  
  // Simula um tempo de "análise"
  await new Promise(r => setTimeout(r, 3000));
  
  const timeSpent = Math.round((new Date() - state.timeStart) / 60000);
  
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div class="jim-icon">🌤️</div>
    <h2>Orgulho de você, ${state.user}.</h2>
    <p class="prose">Você dedicou cerca de ${timeSpent} minutos para cuidar de si mesmo. Isso é mais do que a maioria das pessoas faz em uma semana inteira.</p>
    <div class="end-card" style="margin-top:20px; padding:20px; background:rgba(168,218,188,0.2); border-radius:15px;">
        <p class="prose" style="font-size:14px; color: #2d8c45;">"O que você escreveu sobre '${content.substring(0,20)}...' ficará guardado no seu coração."</p>
    </div>
    <button class="btn btn-primary" onclick="location.reload()">Fazer novo Check-in</button>
    <p class="prose" style="font-size:11px; margin-top:15px;">Se precisar de ajuda urgente, ligue 188 (CVV).</p>
  `;
}

// Iniciar Onboarding
document.getElementById('userName').addEventListener('keypress', e => { if(e.key === 'Enter') saveUser(); });
