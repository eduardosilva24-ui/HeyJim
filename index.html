<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HeyJim</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      background: linear-gradient(180deg, #6EC6FF, #EAF6FF);
      transition: 1s ease;
    }

    .app {
      width: 100%;
      max-width: 450px;
      padding: 30px;
      border-radius: 25px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      text-align: center;
    }

    .jim {
      font-size: 80px;
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #FFD54F;
      cursor: pointer;
      font-weight: bold;
    }

    .top {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .mini {
      padding: 6px 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    #chat, #login, #home {
      display: none;
    }

    #home {
      display: block;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- TOP CONTROLS -->
  <div class="top">
    <div class="mini" onclick="toggleLang()">🌐</div>
    <div class="mini" onclick="toggleMusic()">🎵</div>
  </div>

  <!-- HOME / ONBOARDING -->
  <div id="home">
    <div class="jim">🤖</div>

    <h2 id="title"></h2>
    <p id="subtitle"></p>
    <p id="onboarding"></p>

    <button onclick="goLogin()" id="startBtn"></button>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <input id="nameInput">
    <button onclick="login()" id="loginBtn"></button>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="text"></div>
    <div id="options"></div>
  </div>

</div>

<!-- MUSIC -->
<audio id="music" loop></audio>

<script>
/* ================================
   API
================================ */
const API = "https://script.google.com/macros/s/AKfycbyqoVUlQyZHE9J51BKVElQTIx_i7ZBZFZ5fvknwqFr9Nh0hz42RrI0Zp5zvW0LCKpXa4g/exec";

/* ================================
   STATE
================================ */
let user = "";
let emotion = "";
let lang = "EN";
let music = false;

/* ================================
   TRANSLATIONS
================================ */
const T = {

  title: {
    en: "HeyJim",
    pt: "HeyJim"
  },

  subtitle: {
    en: "May: Mental Awareness Month",
    pt: "Maio: Mês da Conscientização da Saúde Mental"
  },

  onboarding: {
    en: "Mental Health Awareness Month exists to raise awareness, reduce stigma and encourage emotional well-being.",
    pt: "O Mês da Saúde Mental existe para aumentar a conscientização, reduzir estigmas e promover bem-estar emocional."
  },

  start: { en:"Start", pt:"Começar" },

  loginPlaceholder: { en:"Enter your name", pt:"Digite seu nome" },

  loginBtn: { en:"Start", pt:"Iniciar" },

  feeling: {
    en:"How have you been feeling lately?",
    pt:"Como você tem se sentido ultimamente?"
  },

  anxious: { en:"Anxious", pt:"Ansioso" },
  sad: { en:"Sad", pt:"Triste" },
  stressed: { en:"Stressed", pt:"Estressado" },
  notsure: { en:"Not sure", pt:"Não sei" },

  thoughts: { en:"Thoughts", pt:"Pensamentos" },
  body: { en:"Body", pt:"Corpo" },

  continue: { en:"Continue", pt:"Continuar" },

  cvv: { en:"CVV Support", pt:"Apoio CVV" },

  restart: { en:"Restart", pt:"Recomeçar" }
};

/* ================================
   TRANSLATION HELPER
================================ */
function t(obj){
  return obj[lang === "EN" ? "en" : "pt"];
}

/* ================================
   INIT UI
================================ */
function init(){
  document.getElementById("title").innerText = t(T.title);
  document.getElementById("subtitle").innerText = t(T.subtitle);
  document.getElementById("onboarding").innerText = t(T.onboarding);
  document.getElementById("startBtn").innerText = t(T.start);
  document.getElementById("loginBtn").innerText = t(T.loginBtn);
  document.getElementById("nameInput").placeholder = t(T.loginPlaceholder);
}
init();

/* ================================
   MUSIC FIX (REAL WORKING)
================================ */
function unlockMusic(){
  const a = document.getElementById("music");
  a.src = "https://docs.google.com/uc?export=open&id=1Td3OLZVvYA-kgyzbUiFAqSvdazzsZbHs";
  a.play().catch(()=>{});
  music = true;
}

function toggleMusic(){
  const a = document.getElementById("music");
  if(music) a.pause();
  else a.play().catch(()=>{});
  music = !music;
}

/* ================================
   LANGUAGE
================================ */
function toggleLang(){
  lang = lang === "EN" ? "PT" : "EN";
  init();
}

/* ================================
   NAVIGATION
================================ */
function goLogin(){
  unlockMusic();
  document.getElementById("home").style.display = "none";
  document.getElementById("login").style.display = "block";
}

/* ================================
   LOGIN
================================ */
function login(){
  const name = document.getElementById("nameInput").value;

  fetch(API + "?action=login&name=" + encodeURIComponent(name))
  .then(r=>r.json())
  .then(d=>{

    user = name;
    emotion = d.lastEmotion || "";

    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";

    show(t(T.feeling), [
      {label:t(T.anxious), action: anxiousFlow},
      {label:t(T.sad), action: sadFlow},
      {label:t(T.stressed), action: stressFlow},
      {label:t(T.notsure), action: neutralFlow}
    ]);
  });
}

/* ================================
   CHAT UI
================================ */
function show(text, options){
  document.getElementById("text").innerText = text;
  const box = document.getElementById("options");
  box.innerHTML = "";

  options.forEach(o=>{
    const b = document.createElement("button");
    b.innerText = o.label;
    b.onclick = o.action;
    box.appendChild(b);
  });
}

/* ================================
   ANXIETY TREE
================================ */
function anxiousFlow(){
  emotion = "anxious";

  show(lang==="EN"
    ?"Is it in your thoughts or your body?"
    :"Está nos seus pensamentos ou no seu corpo?",
  [
    {label:t(T.thoughts), action: grounding},
    {label:t(T.body), action: grounding}
  ]);
}

/* ================================
   GROUNDING GAME
================================ */
function grounding(){
  show(lang==="EN"?"Find something BLUE":"Encontre algo AZUL",[{
    label:"OK", action: step2
  }]);
}

function step2(){
  show(lang==="EN"?"Find something GREEN":"Encontre algo VERDE",[{
    label:"OK", action: step3
  }]);
}

function step3(){
  show(lang==="EN"?"Find something RED":"Encontre algo VERMELHO",[{
    label:"Done", action: end
  }]);
}

/* ================================
   SAD FLOW
================================ */
function sadFlow(){
  emotion = "sad";

  show(lang==="EN"
    ?"Has this been happening for a while?"
    :"Isso vem acontecendo há um tempo?",
  [
    {label:"Yes", action:end},
    {label:"No", action:end}
  ]);
}

/* ================================
   STRESS FLOW
================================ */
function stressFlow(){
  emotion = "stressed";

  show(lang==="EN"
    ?"What feels heavier?"
    :"O que está mais pesado?",
  [
    {label:"Work", action:end},
    {label:"Everything", action:end}
  ]);
}

/* ================================
   NEUTRAL
================================ */
function neutralFlow(){
  show(lang==="EN"
    ?"That's okay. Let's continue."
    :"Tudo bem. Vamos continuar.",
  [{label:t(T.continue), action:end}]);
}

/* ================================
   ENDING
================================ */
function end(){

  fetch(API + "?action=update&name="+encodeURIComponent(user)+"&emotion="+emotion+"&activity=end");

  show(
    lang==="EN"
      ?"I'm proud of you for being here today 🌤️"
      :"Tenho orgulho de você por estar aqui hoje 🌤️",
    [
      {label:t(T.cvv), action:()=>window.open("https://www.cvv.org.br/")},
      {label:t(T.restart), action:()=>location.reload()}
    ]
  );
}
</script>

</body>
</html>
