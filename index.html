<!DOCTYPE html>
<html>
<head>
  <title>HeyJim</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #6EC6FF, #EAF6FF);
      transition: background 1s ease;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(2px);
      animation: float linear infinite;
    }

    .c1 { width:120px;height:60px;top:10%;animation-duration:80s;}
    .c2 { width:180px;height:90px;top:40%;animation-duration:120s;}
    .c3 { width:140px;height:70px;top:70%;animation-duration:100s;}

    @keyframes float {
      from { transform: translateX(-200px); }
      to { transform: translateX(120vw); }
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.25);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      z-index: 2;
    }

    input, button {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 8px;
    }

    button {
      background: linear-gradient(45deg,#FFD54F,#FFB300);
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.03); }

    #text {
      margin: 20px 0;
      min-height: 70px;
      max-width: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topBtns {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .miniBtn {
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 12px;
    }

    .jim { font-size: 75px; }
  </style>
</head>

<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="app">

  <div class="topBtns">
    <div class="miniBtn" onclick="toggleLang()">🌐</div>
    <div class="miniBtn" onclick="toggleMusic()">🎵</div>
  </div>

  <div class="jim">🤖</div>

  <h2>HeyJim</h2>

  <div id="login">
    <input id="nameInput" placeholder="">
    <button onclick="login()" id="startBtn"></button>
  </div>

  <div id="chat" style="display:none;">
    <div id="text"></div>
    <div id="options"></div>
  </div>

</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0b4e.mp3">
</audio>

<script>
const API = "https://script.google.com/macros/s/AKfycbyqoVUlQyZHE9J51BKVElQTIx_i7ZBZFZ5fvknwqFr9Nh0hz42RrI0Zp5zvW0LCKpXa4g/exec";

let userName = "";
let lastEmotion = "";
let lang = "EN";
let musicOn = false;

/* 🌐 TEXTOS */
const T = {
  EN: {
    welcome: (n)=>`Nice to meet you, ${n}. 🌤️`,
    back: (n,e)=>`Welcome back ${n}. Last time you felt ${e}.`,
    feeling: "How have you been feeling lately?",
    anxious: "Anxious",
    sad: "Sad",
    stressed: "Stressed",
    notsure: "Not sure",
    continue: "Continue",
    game: "Play a short game",
    relax: "Just talk",
    end: "I'm really glad you stayed here today 🌤️",
    restart: "Restart",
    start: "Start",
    placeholder: "Enter your full name"
  },
  PT: {
    welcome: (n)=>`Prazer em te conhecer, ${n}. 🌤️`,
    back: (n,e)=>`Bem-vindo de volta ${n}. Última vez você se sentiu ${e}.`,
    feeling: "Como você tem se sentido ultimamente?",
    anxious: "Ansioso",
    sad: "Triste",
    stressed: "Estressado",
    notsure: "Não sei",
    continue: "Continuar",
    game: "Jogar algo rápido",
    relax: "Só conversar",
    end: "Fico feliz que você ficou aqui hoje 🌤️",
    restart: "Recomeçar",
    start: "Começar",
    placeholder: "Digite seu nome completo"
  }
};

/* 🎵 */
function toggleMusic(){
  const a = document.getElementById("bgMusic");
  musicOn ? a.pause() : a.play();
  musicOn = !musicOn;
}

/* 🌐 FIX: atualiza toda interface */
function toggleLang(){
  lang = (lang === "EN") ? "PT" : "EN";
  applyLanguage();
}

/* 🔁 aplica idioma na UI */
function applyLanguage(){
  document.getElementById("nameInput").placeholder = T[lang].placeholder;
  document.getElementById("startBtn").innerText = T[lang].start;
}

/* 🎨 BACKGROUND */
function setBackground(mood){
  if(mood === "sad"){
    document.body.style.background = "linear-gradient(180deg, #5C6BC0, #1A237E)";
  } else if(mood === "anxious"){
    document.body.style.background = "linear-gradient(180deg, #FFB74D, #E65100)";
  } else if(mood === "stressed"){
    document.body.style.background = "linear-gradient(180deg, #EF5350, #B71C1C)";
  } else {
    document.body.style.background = "linear-gradient(180deg, #6EC6FF, #EAF6FF)";
  }
}

/* LOGIN */
function login(){
  const name = document.getElementById("nameInput").value;

  fetch(API + "?action=login&name=" + encodeURIComponent(name))
  .then(r=>r.json())
  .then(d=>{
    userName = name;
    lastEmotion = d.lastEmotion || "";

    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";

    if(d.status==="returning"){
      setBackground(lastEmotion);
      show(T[lang].back(d.firstName, lastEmotion), [
        {label:"OK", action: ask}
      ]);
    } else {
      show(T[lang].welcome(d.firstName), [
        {label:"OK", action: ask}
      ]);
    }
  });
}

/* UI */
function show(text, opts){
  document.getElementById("text").innerText = text;
  const d = document.getElementById("options");
  d.innerHTML="";

  opts.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=o.label;
    b.onclick=o.action;
    d.appendChild(b);
  });
}

/* FLOW */
function ask(){
  show(T[lang].feeling, [
    {label:T[lang].anxious, action:()=>alert("flow")},
    {label:T[lang].sad, action:()=>alert("flow")},
    {label:T[lang].stressed, action:()=>alert("flow")},
    {label:T[lang].notsure, action:()=>alert("flow")}
  ]);
}

/* INIT */
applyLanguage();
</script>

</body>
</html>
