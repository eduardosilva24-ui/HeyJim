<!DOCTYPE html>
<html>
<head>
  <title>HeyJim</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #6EC6FF, #EAF6FF);
      transition: background 1s ease;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(2px);
      animation: float linear infinite;
    }

    .c1 { width:120px;height:60px;top:10%;animation-duration:80s;}
    .c2 { width:180px;height:90px;top:40%;animation-duration:120s;}
    .c3 { width:140px;height:70px;top:70%;animation-duration:100s;}

    @keyframes float {
      from { transform: translateX(-200px); }
      to { transform: translateX(120vw); }
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.25);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      z-index: 2;
    }

    input, button {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 8px;
    }

    button {
      background: linear-gradient(45deg,#FFD54F,#FFB300);
      cursor: pointer;
      font-weight: bold;
    }

    .topBtns {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .miniBtn {
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 12px;
    }

    .jim {
      font-size: 75px;
      display: inline-block;
      animation: jimMove 3s ease-in-out infinite;
    }

    @keyframes jimMove {
      0%   { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-10px) rotate(5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
  </style>
</head>

<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="app">

  <div class="topBtns">
    <div class="miniBtn" onclick="toggleLang()">🌐</div>
    <div class="miniBtn" onclick="toggleMusic()">🎵</div>
  </div>

  <div class="jim">🤖</div>

  <h2>HeyJim</h2>

  <div id="login">
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="login()">Start</button>
  </div>

  <div id="chat" style="display:none;">
    <div id="text"></div>
    <div id="options"></div>
  </div>

</div>

<!-- 🎵 MUSIC LOOP (GOOGLE DRIVE FIXED) -->
<audio id="bgMusic" loop>
  <source src="https://drive.google.com/uc?export=download&id=1Td3OLZVvYA-kgyzbUiFAqSvdazzsZbHs" type="audio/mp3">
</audio>

<script>
const API = "https://script.google.com/macros/s/AKfycbyqoVUlQyZHE9J51BKVElQTIx_i7ZBZFZ5fvknwqFr9Nh0hz42RrI0Zp5zvW0LCKpXa4g/exec";

let userName = "";
let lastEmotion = "";
let lang = "EN";
let musicOn = false;

/* 🌐 TEXTOS */
const T = {
  EN: {
    welcome: (n)=>`Nice to meet you, ${n}. 🌤️`,
    back: (n,e)=>`Welcome back ${n}. Last time you felt ${e}.`,
    feeling: "How have you been feeling lately?",
    anxious: "Anxious",
    sad: "Sad",
    stressed: "Stressed",
    notsure: "Not sure",
    thanks: "Thanks for sharing. Let's take this step by step.",
    continue: "Continue",
    game: "Play a short game",
    relax: "Just talk",
    end: "I'm really glad you stayed here today 🌤️",
    restart: "Restart"
  },
  PT: {
    welcome: (n)=>`Prazer em te conhecer, ${n}. 🌤️`,
    back: (n,e)=>`Bem-vindo de volta ${n}. Na última vez você se sentiu ${e}.`,
    feeling: "Como você tem se sentido ultimamente?",
    anxious: "Ansioso",
    sad: "Triste",
    stressed: "Estressado",
    notsure: "Não sei",
    thanks: "Obrigado por compartilhar. Vamos com calma, um passo de cada vez.",
    continue: "Continuar",
    game: "Jogar algo rápido",
    relax: "Só conversar",
    end: "Fico feliz que você ficou aqui hoje 🌤️",
    restart: "Recomeçar"
  }
};

/* 🎵 */
function toggleMusic(){
  const a = document.getElementById("bgMusic");
  musicOn ? a.pause() : a.play();
  musicOn = !musicOn;
}

/* 🌐 */
function toggleLang(){
  lang = (lang === "EN") ? "PT" : "EN";
}

/* 🎨 BACKGROUND */
function setBackground(mood){
  if(mood === "sad"){
    document.body.style.background = "linear-gradient(180deg, #5C6BC0, #1A237E)";
  } else if(mood === "anxious"){
    document.body.style.background = "linear-gradient(180deg, #FFB74D, #E65100)";
  } else if(mood === "stressed"){
    document.body.style.background = "linear-gradient(180deg, #EF5350, #B71C1C)";
  } else {
    document.body.style.background = "linear-gradient(180deg, #6EC6FF, #EAF6FF)";
  }
}

/* 🤖 JIM */
function setMood(mood){
  const jim = document.getElementById("jim");
  if(!jim) return;

  if(mood === "sad") jim.style.transform = "scale(0.9)";
  else if(mood === "anxious") jim.style.transform = "scale(1.1)";
  else jim.style.transform = "scale(1)";
}

/* LOGIN */
function login(){
  const name = document.getElementById("nameInput").value;

  fetch(API + "?action=login&name=" + encodeURIComponent(name))
  .then(r=>r.json())
  .then(d=>{
    userName = name;
    lastEmotion = d.lastEmotion || "";

    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";

    if(d.status==="returning"){
      setBackground(lastEmotion);
      show(T[lang].back(d.firstName, lastEmotion), [
        {label:"OK", action: ask}
      ]);
    } else {
      show(T[lang].welcome(d.firstName), [
        {label:"OK", action: ask}
      ]);
    }
  });
}

/* UI */
function show(text, opts){
  document.getElementById("text").innerText = text;
  const d = document.getElementById("options");
  d.innerHTML="";

  opts.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=o.label;
    b.onclick=o.action;
    d.appendChild(b);
  });
}

/* FLOW PRINCIPAL */
function ask(){
  show(T[lang].feeling, [
    {label:T[lang].anxious, action: anxiousFlow},
    {label:T[lang].sad, action: sadFlow},
    {label:T[lang].stressed, action: stressFlow},
    {label:T[lang].notsure, action: notSureFlow}
  ]);
}

/* 🧠 ANXIOUS */
function anxiousFlow(){
  setMood("anxious");
  setBackground("anxious");

  show(lang==="EN"
    ? "I hear you. Does it feel more in your thoughts or your body?"
    : "Entendi. Isso está mais nos seus pensamentos ou no seu corpo?",
  [
    {label:"Thoughts", action: anxiousThoughts},
    {label:"Body", action: anxiousBody}
  ]);
}

function anxiousThoughts(){
  show(lang==="EN"
    ? "Sometimes thoughts run too fast. Let's slow them down."
    : "Às vezes os pensamentos aceleram demais. Vamos desacelerar.",
  [
    {label: T[lang].continue, action: breathing},
    {label: T[lang].game, action: game}
  ]);
}

function anxiousBody(){
  show(lang==="EN"
    ? "Your body is reacting. Let's help it relax."
    : "Seu corpo está reagindo. Vamos ajudar ele a relaxar.",
  [
    {label: T[lang].continue, action: breathing},
    {label: T[lang].game, action: game}
  ]);
}

/* 💙 SAD */
function sadFlow(){
  setMood("sad");
  setBackground("sad");

  show(lang==="EN"
    ? "Has this been going on for a while?"
    : "Isso já vem acontecendo há algum tempo?",
  [
    {label:"Yes", action: sadDeep},
    {label:"No", action: reflect}
  ]);
}

function sadDeep(){
  show(lang==="EN"
    ? "That can feel heavy... you're not alone."
    : "Isso pode ser pesado... você não está sozinho nisso.",
  [
    {label: T[lang].game, action: game},
    {label: T[lang].continue, action: reflect}
  ]);
}

/* 🔥 STRESS */
function stressFlow(){
  setMood("stressed");
  setBackground("stressed");

  show(lang==="EN"
    ? "What feels like the biggest pressure right now?"
    : "O que está te pressionando mais agora?",
  [
    {label:"Too many things", action: reflect},
    {label:"People", action: reflect}
  ]);
}

/* 🤍 NOT SURE */
function notSureFlow(){
  show(lang==="EN"
    ? "That's completely okay. We can figure it out slowly."
    : "Tudo bem não saber. Vamos entender isso com calma.",
  [
    {label: T[lang].game, action: game},
    {label: T[lang].continue, action: reflect}
  ]);
}

/* 🌬️ BREATHING */
function breathing(){
  show(lang==="EN"
    ? "Breathe in... hold... and out slowly."
    : "Inspire... segure... e solte devagar.",
  [
    {label: T[lang].continue, action: reflect}
  ]);
}

/* 💭 REFLECTION */
function reflect(){
  show(lang==="EN"
    ? "You're doing your best, and that already matters."
    : "Você está fazendo o seu melhor, e isso já importa muito.",
  [
    {label: T[lang].game, action: game},
    {label: T[lang].continue, action: end}
  ]);
}

/* 🎮 GAME */
function game(){
  show(lang==="EN"
    ? "Look around and find something BLUE 👀"
    : "Olhe ao redor e encontre algo AZUL 👀",
  [
    {label:"Found", action: step2}
  ]);
}

function step2(){
  show(lang==="EN"
    ? "Now something GREEN 🌿"
    : "Agora algo VERDE 🌿",
  [
    {label:"Found", action: step3}
  ]);
}

function step3(){
  show(lang==="EN"
    ? "And finally something RED ❤️"
    : "E por último algo VERMELHO ❤️",
  [
    {label:"Done", action:end}
  ]);
}

/* FINAL */
function end(){
  setBackground("normal");

  fetch(API + "?action=update&name="+encodeURIComponent(userName)+"&emotion="+lastEmotion);

  show(T[lang].end, [
    {label:T[lang].restart, action: ask}
  ]);
}
</script>

</body>
</html>
