<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyJim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #c9e8f7;
    --sky-deep: #8ecae6;
    --peach: #fde8d8;
    --warm: #fff7f0;
    --gold: #f4a261;
    --gold-dark: #e07b3a;
    --mint: #a8dabc;
    --coral: #e07b6a;
    --text: #2d2214;
    --text-soft: #6b5744;
    --card-bg: rgba(255,252,248,0.82);
    --shadow: 0 24px 64px rgba(80,50,20,0.12);
    --radius: 28px;
    --radius-sm: 16px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #b8dff7 0%, #dff0f9 35%, #fde8d8 70%, #fff2e8 100%);
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(142,202,230,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(253,232,216,0.5) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    backdrop-filter: blur(28px) saturate(1.4);
    border-radius: var(--radius);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.6);
    overflow: hidden;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 0;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    user-select: none;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.95); transform: scale(1.08); }
  .ctrl-btn.active { background: var(--gold); }

  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 24px 28px 32px;
    animation: fadeUp 0.4s ease both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .jim-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 16px;
  }

  .jim {
    font-size: 72px;
    animation: float 3.2s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 8px 16px rgba(80,50,20,0.15));
  }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-14px) rotate(2deg); }
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 10px;
  }
  h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.3px;
    text-align: center;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--gold-dark);
    text-align: center;
    margin-bottom: 16px;
  }

  .prose {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.7;
    text-align: center;
  }

  .fact-strip {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .fact-pill {
    background: rgba(244,162,97,0.15);
    border: 1px solid rgba(244,162,97,0.3);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.4;
    text-align: center;
  }

  .spacer { flex: 1; }

  .btn {
    width: 100%;
    padding: 15px 20px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 10px;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn:hover::after { background: rgba(255,255,255,0.12); }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: white;
    box-shadow: 0 4px 20px rgba(224,123,58,0.35);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.6);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.8);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.9); }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .choice-grid.single { grid-template-columns: 1fr; }

  .choice-btn {
    padding: 16px 12px;
    border-radius: var(--radius-sm);
    border: 1.5px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.55);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    transition: var(--transition);
    line-height: 1.35;
  }
  .choice-btn .emoji { font-size: 26px; display: block; margin-bottom: 6px; }
  .choice-btn:hover {
    background: rgba(255,255,255,0.9);
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(80,50,20,0.08);
  }
  .choice-btn:active { transform: scale(0.97); }

  .input-field {
    width: 100%;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.65);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: var(--transition);
    margin-bottom: 12px;
  }
  .input-field:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 4px rgba(244,162,97,0.15);
  }
  .input-field::placeholder { color: var(--text-soft); opacity: 0.6; }

  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(80,50,20,0.15);
    transition: var(--transition);
  }
  .dot.active { background: var(--gold); width: 20px; border-radius: 3px; }

  .color-target {
    margin: 20px auto;
    width: 100%;
    max-width: 260px;
    aspect-ratio: 1;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    transition: background 0.6s ease, transform 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .color-target::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    border-radius: inherit;
  }
  .color-target .color-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .found-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(255,255,255,0.9);
    color: #2d8c45;
    font-size: 18px;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1;
  }
  .found-badge.show { opacity: 1; transform: scale(1); }

  .end-card {
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.8);
    margin: 16px 0;
  }
  .end-card .big-emoji { font-size: 48px; margin-bottom: 10px; }

  .link-btn {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 100px;
    background: rgba(244,162,97,0.15);
    border: 1px solid rgba(244,162,97,0.4);
    color: var(--gold-dark);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: var(--transition);
    margin: 4px;
  }
  .link-btn:hover { background: rgba(244,162,97,0.3); }

  .onboarding-step {
    display: none;
  }
  .onboarding-step.active { display: flex; flex-direction: column; flex: 1; }

  .step-icon { font-size: 52px; text-align: center; margin: 16px 0 12px; }
</style>
</head>
<body>

<div class="app" id="app">

  <div class="top-bar">
    <div class="brand">HeyJim</div>
    <div class="controls">
      <div class="ctrl-btn" id="langBtn" onclick="toggleLang()" title="Change language">🌐</div>
      <div class="ctrl-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle music">🎵</div>
    </div>
  </div>

  <!-- ONBOARDING SCREEN -->
  <div class="screen active" id="screen-onboard">

    <div class="jim-wrap"><div class="jim">🤖</div></div>

    <!-- Step 0: Welcome -->
    <div class="onboarding-step active" id="ob0">
      <h1 id="ob-title"></h1>
      <p class="subtitle" id="ob-month"></p>
      <p class="prose" id="ob-desc1"></p>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="obNext()" id="ob-next1"></button>
    </div>

    <!-- Step 1: Facts -->
    <div class="onboarding-step" id="ob1">
      <div class="step-icon">🌍</div>
      <h2 id="ob-fact-title"></h2>
      <div class="fact-strip" id="ob-facts"></div>
      <p class="prose" id="ob-desc2"></p>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="obNext()" id="ob-next2"></button>
    </div>

    <!-- Step 2: Jim intro -->
    <div class="onboarding-step" id="ob2">
      <div class="step-icon">💬</div>
      <h2 id="ob-jim-title"></h2>
      <p class="prose" id="ob-jim-desc"></p>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="goLogin()" id="ob-start"></button>
    </div>

    <div class="progress-dots">
      <div class="dot active" id="pd0"></div>
      <div class="dot" id="pd1"></div>
      <div class="dot" id="pd2"></div>
    </div>

  </div>

  <!-- LOGIN SCREEN -->
  <div class="screen" id="screen-login">
    <div class="jim-wrap" style="margin-top:20px"><div class="jim" style="font-size:56px">🤖</div></div>
    <h2 id="login-title"></h2>
    <p class="prose" id="login-sub" style="margin-bottom:24px"></p>
    <input class="input-field" id="nameInput" type="text" id="ob-next2">
    <button class="btn btn-primary" onclick="login()" id="loginBtn"></button>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="screen-chat">
    <div id="chat-content" style="flex:1; display:flex; flex-direction:column;"></div>
  </div>

</div>

<audio id="music" loop src="https://docs.google.com/uc?export=open&id=1Td3OLZVvYA-kgyzbUiFAqSvdazzsZbHs"></audio>

let lang = "en";
let user = "";

    stressed: { en: { label: "Stressed",   emoji: "😤" }, pt: { label: "Estressado", emoji: "😤" } },

  groundingIntro: {

    pt: ["Azul",   "Verde",  "Vermelho"]
  },
  groundingFound: {

  groundingDone: {

  },
  sadShort:    { en: { label: "Just today",      emoji: "☁️" }, pt: { label: "Só hoje",         emoji: "☁️" } },
  sadLong:     { en: { label: "A while now",     emoji: "🌧️" }, pt: { label: "Há algum tempo",  emoji: "🌧️" } },

    pt: "Tudo bem. Alguns dias são simplesmente mais difíceis. O que normalmente melhora um pouco seu humor?"

  sadLongMsg: {

  },
  sadContinue: { en: "Continue →",       pt: "Continuar →" },
  stressQ: {

  },
  stressWork:  { en: { label: "Work &\nresponsibilities", emoji: "💼" },

  stressAll:   { en: { label: "Everything\nat once",         emoji: "🌊" },

  energyHighMsg: {

  },
  energyLowMsg: {

  cvv:         { en: "CVV Support Line",     pt: "Apoio CVV" },

  no:          { en: "No",    pt: "Não" }

function t(obj, sub) {
  const base = obj[lang];
  return sub ? base[sub] : base;
}

function initUI() {
  document.getElementById("ob-title").innerText    = t(T.obTitle);
  document.getElementById("ob-month").innerText    = t(T.obMonth);
  document.getElementById("ob-desc1").innerText    = t(T.obDesc1);
  document.getElementById("ob-next1").innerText    = t(T.obNext1);
  document.getElementById("ob-fact-title").innerText = t(T.obFactTitle);
  document.getElementById("ob-desc2").innerText    = t(T.obDesc2);
  document.getElementById("ob-next2").innerText    = t(T.obNext2);
  document.getElementById("ob-jim-title").innerText = t(T.obJimTitle);
  document.getElementById("ob-jim-desc").innerText  = t(T.obJimDesc);
  document.getElementById("ob-start").innerText    = t(T.obStart);
  document.getElementById("login-title").innerText = t(T.loginTitle);
  document.getElementById("login-sub").innerText   = t(T.loginSub);
  document.getElementById("nameInput").placeholder = t(T.loginPlaceholder);
  document.getElementById("loginBtn").innerText    = t(T.loginBtn);

  const factsEl = document.getElementById("ob-facts");
  factsEl.innerHTML = "";
  t(T.obFacts).forEach(f => {
    const pill = document.createElement("div");
    pill.className = "fact-pill";
    pill.innerText = f;
    factsEl.appendChild(pill);
  });
}
initUI();

function toggleLang() {
  lang = lang === "en" ? "pt" : "en";
  document.getElementById("langBtn").title = lang === "en" ? "Português" : "English";
  initUI();
}

let musicUnlocked = false;
function unlockMusic() {
  if (musicUnlocked) return;
  musicUnlocked = true;
  const a = document.getElementById("music");
  a.volume = 0.35;
  a.play().then(() => { musicPlaying = true; document.getElementById("musicBtn").classList.add("active"); })
           .catch(() => {});
}

function toggleMusic() {
  const a = document.getElementById("music");
  if (!musicUnlocked) { unlockMusic(); return; }
  if (musicPlaying) { a.pause(); musicPlaying = false; document.getElementById("musicBtn").classList.remove("active"); }
  else              { a.play();  musicPlaying = true;  document.getElementById("musicBtn").classList.add("active"); }
}

function obNext() {
  obStep++;
  document.querySelectorAll(".onboarding-step").forEach((s,i) => {
    s.classList.toggle("active", i === obStep);
  });
  document.querySelectorAll(".dot").forEach((d,i) => {
    d.classList.toggle("active", i === obStep);
  });
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
}

function goLogin() {
  unlockMusic();
  showScreen("login");
}

function login() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  user = name;
  showScreen("chat");

  fetch(API + "?action=login&name=" + encodeURIComponent(name))
    .catch(() => {});

  askFeeling();
}

function chat(content) {
  const cc = document.getElementById("chat-content");
  cc.innerHTML = "";
  cc.appendChild(content);
  content.style.display = "flex";
  content.style.flexDirection = "column";
  content.style.flex = "1";
  content.style.animation = "fadeUp 0.35s ease both";
}

function buildChat(question, choices, note) {
  const wrap = document.createElement("div");

  const q = document.createElement("h2");
  q.style.marginBottom = "6px";
  q.style.textAlign = "center";
  q.innerText = question;
  wrap.appendChild(q);

  if (note) {
    const n = document.createElement("p");
    n.className = "prose";
    n.style.marginBottom = "4px";
    n.innerText = note;
    wrap.appendChild(n);
  }

  const spacer = document.createElement("div");
  spacer.className = "spacer";
  wrap.appendChild(spacer);

  const grid = document.createElement("div");
  grid.className = choices.length <= 2 ? "choice-grid" : "choice-grid";
  if (choices.length === 1) grid.classList.add("single");
  wrap.appendChild(grid);

  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (c.emoji) {
      const em = document.createElement("span");
      em.className = "emoji";
      em.innerText = c.emoji;
      btn.appendChild(em);
    }
    btn.appendChild(document.createTextNode(c.label));
    btn.onclick = c.action;
    grid.appendChild(btn);
  });

  return wrap;
}

function buildMessage(emoji, title, body, buttons) {
  const wrap = document.createElement("div");
  wrap.style.flex = "1";
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";

  const card = document.createElement("div");
  card.className = "end-card";
  card.innerHTML = '<div class="big-emoji">' + emoji + '</div>';
  const h = document.createElement("h2");
  h.innerText = title;
  card.appendChild(h);
  if (body) {
    const p = document.createElement("p");
    p.className = "prose";
    p.style.marginTop = "8px";
    p.innerText = body;
    card.appendChild(p);
  }
  wrap.appendChild(card);

  const sp = document.createElement("div");
  sp.className = "spacer";
  wrap.appendChild(sp);

  buttons.forEach(b => {
    const btn = document.createElement("button");
    btn.className = b.primary ? "btn btn-primary" : "btn btn-ghost";
    btn.style.marginTop = "10px";
    btn.innerText = b.label;
    btn.onclick = b.action;
    wrap.appendChild(btn);
  });

  return wrap;
}

function askFeeling() {
  const c = buildChat(t(T.feelingQ), [
    { emoji: t(T.emo.anxious,  lang).emoji, label: t(T.emo.anxious,  lang).label, action: anxiousFlow },
    { emoji: t(T.emo.sad,      lang).emoji, label: t(T.emo.sad,      lang).label, action: sadFlow },
    { emoji: t(T.emo.stressed, lang).emoji, label: t(T.emo.stressed, lang).label, action: stressFlow },
    { emoji: t(T.emo.notsure,  lang).emoji, label: t(T.emo.notsure,  lang).label, action: notSureFlow }
  ]);
  chat(c);
}

/* ---- ANXIOUS ---- */
function anxiousFlow() {
  emotion = "anxious";
  const c = buildChat(t(T.anxThoughtsBodyQ), [
    { emoji: t(T.thoughts, lang).emoji, label: t(T.thoughts, lang).label, action: startGrounding },
    { emoji: t(T.body,     lang).emoji, label: t(T.body,     lang).label, action: startGrounding }
  ]);
  chat(c);
}

/* ---- GROUNDING GAME ---- */
let groundStep = 0;
const COLORS = [
  { bg: "#5b9bd5", text: "#fff", shadow: "rgba(91,155,213,0.4)" },
  { bg: "#4caf74", text: "#fff", shadow: "rgba(76,175,116,0.4)" },
  { bg: "#e05252", text: "#fff", shadow: "rgba(224,82,82,0.4)"  }
];

function startGrounding() {
  groundStep = 0;
  showGroundStep();
}

function showGroundStep() {
  const colorNames = t(T.groundingColors);
  const foundTexts = t(T.groundingFound);
  const col = COLORS[groundStep];

  const wrap = document.createElement("div");
  wrap.style.flex = "1";
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";

  const intro = document.createElement("p");
  intro.className = "prose";
  intro.style.textAlign = "center";
  intro.style.marginBottom = "0";
  intro.innerText = t(T.groundingIntro);
  wrap.appendChild(intro);

  const target = document.createElement("div");
  target.className = "color-target";
  target.style.background = col.bg;
  target.style.color = col.text;
  target.style.boxShadow = "0 12px 32px " + col.shadow;
  target.innerHTML = '<span style="font-size:36px">👁️</span><span class="color-label">' + colorNames[groundStep] + '</span>';

  const badge = document.createElement("div");
  badge.className = "found-badge";
  badge.innerText = "✓";
  target.appendChild(badge);
  wrap.appendChild(target);

  const dotsWrap = document.createElement("div");
  dotsWrap.style.display = "flex";
  dotsWrap.style.justifyContent = "center";
  dotsWrap.style.gap = "8px";
  dotsWrap.style.margin = "0 0 8px";
  for (let i = 0; i < 3; i++) {
    const d = document.createElement("div");
    d.style.cssText = "width:8px;height:8px;border-radius:50%;transition:all 0.3s;background:" + (i <= groundStep ? col.bg : "rgba(80,50,20,0.15)");
    dotsWrap.appendChild(d);
  }
  wrap.appendChild(dotsWrap);

  const sp = document.createElement("div");
  sp.className = "spacer";
  wrap.appendChild(sp);

  const foundBtn = document.createElement("button");
  foundBtn.className = "btn btn-primary";
  foundBtn.innerText = t(T.groundingBtn);
  foundBtn.onclick = () => {
    badge.classList.add("show");
    foundBtn.disabled = true;
    foundBtn.style.opacity = "0.5";
    setTimeout(() => {
      groundStep++;
      if (groundStep < 3) showGroundStep();
      else groundingDone();
    }, 800);
  };
  wrap.appendChild(foundBtn);

  chat(wrap);
}

function groundingDone() {
  const w = buildMessage("🌿", t(T.groundingDone), null, [
    { label: t(T.continueBtn), primary: true, action: endFlow }
  ]);
  chat(w);
}

  wrap.appendChild(restartBtn);

  chat(wrap);
